body:
  text: 佛祖讚釋迦佛出山相六年如兀復如癡麻麥如何療得飢成道時當三十歲修行知歷幾僧祇乳糜奉供先牛女御服輕將貿獵師示現凡夫世間相故教金步混塵泥入山耐得雪霜寒出得山來眼界寬還了六年麻麥債黃金殿上草漫漫旃檀佛寶階三道降人間忉利宮中說法還輪輻香敷金菡萏玉毫光耀紫旃檀人天百萬獅音震剎海三千象武寬歷劫何曾異今日巍巍常在鷲頭山文殊普賢不居五臺山豈住清凉寺手內執何經經中談底事勘破維摩不二門好箇翻身獅子子雲興二百問瓶瀉二千酬有如香象王截斷恆河流如意擊開銀世界峨眉山色玉光浮草衣文殊法王之子七佛之師入毗耶問維摩之疾秉慧劒斷二乘之疑接善財長伸金臂對無著擎起玻瓈散三千丈緑雲之𩬊披八吉祥香草之衣臺山六月雪花飛奮迅還他獅子兒觀音菩薩得大自在正法王三千界舒白毫光玉盂拍滿甘露漿盤陀石上金剛幢稽首觀世音深得大自在三十二應身變現周沙界是故善財童被此堅固鎧能於十指端涌出祥光彩巍巍萬德尊特立雲霞外如日出扶桑如月生滄海一瞻勝妙容滅却曠劫罪一稱大士名功德獲萬倍向此光明中身心自安泰為語苦衆生慎勿生懈怠悲願化行塵剎海法身高出萬由旬洗空魔界衆生界震動風輪與水輪白菡萏舟遊鬼國碧琉璃殿駭波神大家證入三摩地甘露瓶中柳正春八萬由旬吉祥之法身三十二應慈悲之妙相統十方剎土同一歸依鼓百萬迅雷作一回向明月光分衆水中陽春錦綻千花上應以此身而說法十方世界示童真巖間人看水底月水底月看巖上人虗空為體法界為量示十四無畏之威現四八慈悲之相髻珠明朗開大千解脫之門瓶柳搖春掃衆生無明之障陽春密布百花叢月明遍在千波上以眼聞聲以身為舌如說而行如行而說一葉蓮舟千尋濤雪八萬四千圓通法門藕絲孔中七穿八穴開甘露門廓悲願海宴坐盤陀得大自在以大悲水長正法芽以方便風開智慧花三十二應十四無畏剎剎圓通塵塵三昧魚籃觀音利物垂慈度有緣緑雲欹擁玉嬋娟時人貪看衣中寶三十六鱗飛上天千鈞隻手提滯貨無人買何處是龍門籃中有滄海啞子觀音出得漁家網提來入閙籃只圖論貴賤無復避羞慚慈願猶春育悲心似海寬莫教輕漏泄啞子口喃喃重接續大悲菩薩三十二臂像稽首大士濁世福田首目與臂八萬四千惟此大悲三十二臂如大樹王衆枝所寄究其所表四八應身一身一臂任運屈伸頂戴彌陀手擎日月持杵振鈴群魔消滅秉吹毛劒提四楞蕳楊柳風清淨瓶水滿架精進箭張智慧弓天龍八部風虎雲龍月斧寶弓棒矛鎗戟右印左條慈威翼翼或結四印或握二蓮大機普應大用現前或合兩掌或揑兩拳或伸兩臂垂手入大士一身具此三昧八萬四千亦復如是大周法界細入微塵千變萬化歸乎一真維朱祐之曲盡其妙心手俱忘成於談笑昔本不墮今亦不增曇華再現枯木重榮即一切法離一切相水月空花無去來想我作是偈功德難量開甘露門樹光明幢吳興慈感天台教寺蚌珠觀音稽首大士千億應身隨聲赴感剎剎塵塵一蚌殼中無邊世界非實非虗非寬非隘惟此蚌珠日月精華豈意大士來生我家行道白衣端嚴妙相頂佩圓珠光明無量諸天擁護二龍前行善財恭敬頻伽欲鳴潯溪蔣公陰德所洽應以此身而為說法爍迦羅首以表法身慈攝中道如花藏春清淨寶目以表般若照了萬境無可逃者母陀羅臂以表解脫定以止散衆苦俱拔我此蚌珠三德俱備即空假中悉歸真諦偉哉嶽祥千鈞重寄罔象無心獲此如意前佛後佛無二無同法界海慧平等圓通昔日蚌珠示現應真今此蚌珠示現佛身佛身無為不墮諸數如太虗空堂堂獨露入此樓閣彌勒同龕萬花圍繞間世優曇馬郎婦頭不梳面不洗除却馬郎知音能幾流水無情戀落花落花何事隨流水子昂趙學士筆大士示現宰官身宴坐玉堂而說法一朝奉詔登寶陀親覩如是慈悲相誓圖千本散人間普為群生作依怙玉堂仙去不記年而此應身常住世當時毛頴與陶泓有情無情同作佛布袋和尚契此翁少叢林腹便便笑吟吟布袋中拈出百二十件兜率陀天底樓閣前拋出百二十箇菩提心人間天上蹤跡難尋七十二汀烟水深阿逸多鐵奉化破布囊索高價以八萬四千而為色身以人間四百年為一晝夜只管東奔西馳不肯從空放下金色頭陀在雞足山中夢覺幾回等你當來下生三會龍華說箇之乎者也拄杖拓開兜率院布囊包褁苦娑婆他無惱亂衆生意自是衆生惱亂他三會龍華未廝當長街短巷恣佯狂布囊裏許乾坤大主丈頭邊日月長兜率陀天乾屎橛毗盧樓閣水雲鄉却言我是真彌勒家醜無端向外揚維摩詐疾欺人實自欺散花玉女亦攢眉若無香積盂中飯一默應難療衆飢毗耶老人無住著獨坐匡牀頓銷鑠一半虗頭一半癡通身是病通身藥文殊領衆來對談至極則處口即緘上方鉢飯香郁郁法筵華雨紅𣯶𣯶菴羅樹園在何處掌擎大衆同歸去人天百萬世尊前清風撼動旃檀樹耆婆大士稽首耆婆出世醫王有大願力具大威光人有四百四脉衆生之病師有八萬四千對治之方兩箇胡盧是何妙藥一根靈木洞見膏肓使一切人瞻其尊像稱其名號非惟愈多生之痼疾直是消除業障廓清塵纍俾身心毛孔皆得其清凉穢跡金剛三首示以三觀法門八臂示其八方禦侮顯百千諸佛之威權救一切衆生之疾苦即勝熱婆羅門火聚即無厭足王刀鋸聞者魔外潛蹤見者寒毛卓竪行此道持此法現此形立此壇者誰是同儔釋迦覺雄觀音龍樹寶公大士鏡容煌煌金錫堂堂剪刀尺拂讖陳齊梁言達磨傳佛心印追之不及謂大士講經已竟少借威光終日拈香擇火不知身是道場妙相僧繇難著筆巍巍坐斷獨龍岡僧伽大士道運等慈智能普照以金錫鎮泗水之津魔外由是歸降以淨巾盛傾湫之雨涓渧了無滲漏三十六應如圓通大士之現神通一堅密身與寶公肉身而同不朽夫是之謂大聖僧伽國師長淮九州民之父母者也羅漢阿羅漢即無煩惱常住人間不涅槃渡水腳跟浮逼逼穿雲頭上黑漫漫不為自己邏齊供只要衆生破吝慳日日遊行四天下石橋方廣幾時還朝陽對月寒暑一衲補舊如新東搭西搭橫紉竪紉金烏西沒又東升不把金針度與人者一卷經談什麼事不是唐言亦非梵字玉兔光中轉法輪生芽黑豆河沙數穴鼻針無絲線用盡工夫補成一片紅輪幾度見升沉寒暑一裘金不換圓頓教了義經循行數墨信受奉行不是光明偏愛月山堂寂寞夜無燈須菩提祗園會上問法如流居士門前置鉢欲去巖間宴坐惹動天花倚杖思惟無本可據若將空寂證圓通烏龜稽首須彌柱豐干寒拾三人行談甚事不說峨眉五臺便說西方淨土國清寺風月平分寒巖下醜拙俱露大人境界有誰知幾回來往松門路寒山拾得六月臺山雪人間沸似湯芭蕉搖動處遍界是清凉手內一卷經字字無人識赤腳下峨眉九九八十一國清寺裏箇蓬頭相喚相呼去看牛禿帚生苕偏峭措襤襂破衲轉風流拈來一片芭蕉葉寫出百篇張打油叵耐豐干輕觸諱至今落賺老閭丘是誰拾得便為名却道寒山是我兄不放一塵來實際盡將萬事付吟情打他土地防鴉食嚇倒溈山作虎聲拍手高歌脫身去寒巖回首暮雲平初祖九州之鐵鑄不得西來一錯萬兩黃金博不得老蕭一諾五色麒麟飛上天丹山鸞鳳巢阿閣樹起東土勝幢撼動竺乾木鐸熊耳峰前急轉身無限清風動寥廓梁江萬頃波濤立魏嶺九年冰雪深脫得渾身歸竺國至今隻履重千金五祖巍巍坐斷白蓮峯靜聽風吟萬壑松七百高僧何處去碓坊有米沒人舂百丈獨坐雄峯無齒大蟲一回鼻痛三日耳聾遭黃蘗攔腮一掌憐兒不覺醜對溈山夜深撥火錯認橘皮紅立禪苑清規如蕭何之制律向馬師卷席猶射羿之逢蒙面目森嚴難近傍叢林千古凜威風臨濟師之面目如秋月之孤圓師之道德如杲日之麗天有吞過現未來諸佛之口宜拍四七二三諸祖之肩當機不讓揮黃蘗攔腮一掌大用現前築大愚肋下三拳四種料揀猶虎之缺馬之馽三玄三要如坤之斷乾之連兒孫遍滿天下皆謂得師正傳殊不知正法眼藏滅向瞎驢邊天台智者大師具大智慧有大辨才悟法華旋陀羅尼三昧是真精進見靈山一會儼然未散親覩如來說摩訶止觀揭釋天之日月談禪波羅蜜鼓覺海之風雷切柏代香金爐繚繞卷簾進月銀地裴回千古仰之猶大山北斗萬世尊之惟南嶽天台手執玉如意宴坐金剛臺圓伊三點摩醯眼祕藏重重盡豁開趙州口似含珠頭如木勺少年時道是有主沙彌八十歲行甚馬腳驢腳三五斗頭上青灰一箇牙下下咬著直饒使得十二時辰也是秦時𨍏輅咄雪峰雪覆鰲山月明象骨項上鐵枷至今未脫李侍郎參藥山天上雲瓶中水見面聞名賤目貴耳一段風光畫不成樹頭瑟瑟寒濤起斐相國參黃蘗手中佛壁上僧一呼某甲即與安名從此事師為弟子舉頭一十二峯青靈照女年少龐家女機鋒足可誇笊籬撈白月斂袂對丹霞共說無生話休攤樹上麻臨終看日色誑殺老爺爺政黃牛湖水湖山得趣多無邊風月暗消磨黃牛角上一吟卷半是樵歌半牧歌郁山主來往茶陵歲月深幾回春雨又春陰不因驢上翻筋斗打失明珠沒處尋懶瓚嶽頂雲深絶路行臥藤蘿下過平生十年宰相輕饒舌一箇高僧擅懶名芝詔忽臨天咫尺芋魁從此價連城如斯標致今誰是更看黃河幾度清天童淨和尚兩頭白牯眉毛竪三面狸奴鼻孔凹一隻皮靴能剔脫月明金鳳宿龍巢雪峰圓覺演禪師宗說俱通縱橫無礙躍倒須彌盧踏翻圓覺海得元豐密旨了知迷是悟之鉗鎚輥雪嶠木毬要顯凡乃聖之爐鞴萬仞崖前獨足立鼻孔摩觸家風十字街頭破瓦片髑髏常干世界耀古騰今光明盛大夫是之謂天衣天鉢直下底兒孫擬向望州亭烏石嶺見渠大似漆桶不快咄落髮先師月溪和尚嗣癡絶用翳睛法施礔礰機面上刮得霜落𦚾中全沒慈悲把斷螺江水魚龍乞命放出南山虎獅子藏威四坐道場行正令倒拈禿筆𦘕娥眉紫籜古田和尚擔官樣板破天然家用斷貫索子穿衲僧鼻孔放無毛鐵驗四海龍蛇不願成佛作祖钁頭隨分生涯夫是之謂白雲關外出嶺玄沙育王橫川和尚西丘克家嗣松源的骨孫滅臨濟正法眼碎中峰破沙盆失却劒於昆明池裏撈得鋸於曲江江邊騰今耀古搖乾蕩坤黃河九曲兮水出昆侖天瑞先師虎巖和尚驪珠可抉虎鬚可捋凜然其不可犯者令行吳越天童竺西和尚河目海口錦心繡腸汪汪吞太湖之器量煌煌粲太白之光芒怒罵時海涵春育慈悲處烈日秋霜舉玄沙未徹語如真淨驗寂音黃金百煉之色拈洞山三頓棒類慈明發積翠丹砂九轉之香橫幾莫莫有陳堂堂夫是之謂中峯五世大樹之蔭凉者也徑山晦機和尚雪竇石室請面目肖大智之癯機智具永明之辨一國師奔雷震霆四藤條飛星閃電握䪥室文筆九𣇄可扛建大將旗鼓三軍怯戰石室是其克家足以聯芳續𦦨數樹松華千尋雪練于今挂在乳峯前來者一一看方便天目中峯和尚佛祖楷模人天榜樣度量似海之深語默如春之盎碎瑚於鐵鞭撒真珠於羅帳視身如幻住幻為身以相即真全真非相褒之美之號為普應國師瞻之仰之元是中峯和尚大鑑澄禪師禪居叟老瞎禿行藏不貴巧遲用舍只圖拙速類老胡腳踏鯨波似飲光定回雞足巨福山金寶山稱性住持瑞鹿山瑞龍山了無拘束濯錦江頭看競渡不謬為南陽一國之師天津橋上弄胡孫好流通永元一枝蠱毒耿耿靈峰照夜燈斷絃須是鸞膠續華頂峯無見和尚道重如山心明似月眼著五須彌口吞三世佛黃沙鉢敲作金聲老菜根甜於崖蜜羚羊挂角不留踪千古華峯高突兀天衣斷江和尚八十禪翁四海眼空面帶匡廬古色身同卓筆奇峯聞其提唱浮佛應為點首觀其出處大梅夫豈同風鴈過長空影沉寒水繼乃祖烹金爐鞴之綱宗秋天之月霜夜之鐘吾將見此菴之道光明盛大綿亘於無窮者也許道卿七贊并序雲間玉清觀道士靜寄法師許道琯潛心吾大聖人之道甚力書雜花大經全部者三法華全部者四十有六楞嚴圓覺諸經不以數計又書法華經塔二常持准提修嚴清泰及化其門人稟治命闍維得不壞者六曰指節曰頂曰齒曰舌曰數珠曰右膝骨靈瑞二曰設利羅曰化佛像其徒玄素法師曹士勤以其師嘗從豫遊求豫識之以信後世乃各為之贊曰指節開則成掌合則成拳於一毫端揑聚大千破一微塵出大經卷蘸乾滄溟書之不倦是故十指常放寶光於烈焰中粲然堅剛上下稱尊指天指地我此法師亦復如是頂頂戴寶冠類傅大士火後鏗然舍利無數頂門一著煒煒煌煌貴同珠璧粲若圭璋由頂至踵由踵至頂是精進幢是大圓鏡螺髮不燼髻珠常明故此髑髏敲作金聲齒歌贊佛乘皆出于口是故齒牙火餘不朽世尊闍維帝釋雨花遣二捷疾盜其𤥖牙豈謂法師慈悲喜捨是其齒牙無敢盜者玄珠晶瑩綴于枯齦函以金玉以示世人舌六受用根驗其功德惟舌之功一千二百法門微妙代佛宣揚故此舌本作蓮花香如說而行如行而說火冷灰寒如初偃月了知味性非有非空藥王藥上同證圓通數珠憶佛念佛晝夜不忘百八摩尼帝網交光於其光中承事諸佛如敲門瓦如渡河筏珠即是佛佛即是珠薪盡火滅珠體如如樹堅固幢被忍辱鎧三灾彌綸此珠常在右膝骨瞻禮聖容一拜一跪一一微塵轉輪王位屈伸俯仰左右逢原是故此膝入火不焚由膝而倒由膝而起折其慢幢恭敬懺悔谷神不死玄牝長存靈芝瑞應福彼後昆舍利人之色身終歸敗壞於敗壞中光明盛大闍維之法始於竺乾粲設利羅八萬四千戒能生定定能生慧玉潤山輝珠明川媚後無彌勒前無釋迦惟此開士火中蓮花化佛像仙家者流寄身寂靜有化如來現之于頂楞嚴圓覺妙蓮雜花流通書寫如恆河沙多𤥖浮圖筆端涌出分座談經是為化佛投身火聚開勝熱門萬物一體天地同根自讚真淨院清拙澄長老請吾於真淨有大因緣信孚檀度金布祇園擬老南之積翠仰妙喜之雲門但以道不及古德愧前賢賴有雞峯師弟何妨𦦨續芳聯從此曹溪家業盛兒孫千載好流傳福州偃峯棠長老請如雲之碧似澱之清師曠不足比其聰離婁安可竝其明萬煆爐中金色百折灘上溪聲吾所望子者不有沖天之飛則有驚人之鳴大雲滿長老請九九百百有年無德破砂盆價重連城驪頷珠分文不直放行則大雲作霖把住則虗室生白雨從何來風作何色桃花浪暖禹門開白日青天轟霹𮦷布金機長老請打鳳羅龍索鹽奉馬劫石可消松風無價分付布金大行此話城山心長老請耐雪松蒼傲霜菊黃定力如城山之固拗性猶金石之剛用松源苕帚樁七穿八穴唱中峰脫空歌換調移腔月布千江之影燈分無盡之光有箇心空如鏡者樹吾天瑞最高幢道濟忠長老請老老大大憨憨癡癡須彌安鼻孔禿帚𦘕娥眉十劫坐道場嫌佛不做一生擔片板無地容錐江月照松風吹行此道濟斯時敵勝還他獅子兒台州明因圭長老請咄者漆桶全無鼻孔拈起本色鉗鎚解釘虗空一縫不是黃蘗大機亦非雪峯大用玉振金聲風行雷動棒頭敲出玉麒麟頂門放出丹山鳳姪曇煥侍者請大江橫陳老榕覆庭南峯如障北嶠如屏生此無名芻草且非人傑地靈蒼松磐石不足比其壽澗水秋月無以喻其清大其家世如優曇鉢花者煥乎東方之明徒弟元達菴主請微風吹幽松凉月挂虗碧心境兩俱忘宴坐盤陀石也不向紫羅帳裏暗撒真珠也不向閙市門頭間拋瓦礫箇是無為達道人一句了然超百億觀藏主請觀身實相觀佛亦然彼觀幻者歷劫常堅瑤席堂中間拈麈拂清風樓上鼓動猊絃鉢囉娘東山正續脫空歌中峯的傳鐘在而隨扣隨響鏡臨臺而誰醜誰妍少林之鉢兮金聲玉振曹溪之燈兮𦦨續芳聯琳藏主請頭白齒黃技無寸長耻釋迦說頓說漸笑達磨歷魏遊梁激揚中峯砂盆遺響發揮天瑞奕世耿光如戞球琳如考琮瑝何處青山不道場徒弟壽嵩院主請山行六七里手把糲竭節老去懶登高十步九回歇凉吾襟者天之風照吾心者松之月守乎真藏乎拙立嵩山臥少室一花五葉好㳅芳父子不傳真妙訣天台資福德長老請質而不華拙而自守有時萬德莊嚴有時佛面百醜孤峯頂上嘯月眠雲十字街頭指槐罵柳拋却舀千吾百衆之木杓開吞盡三世諸佛之口祖翁一箇破沙盆喚作曹溪沒量斗一時分付與孤雲向天台山中作大獅子吼如月維那請眸子眊耳朵聾離婁明師嚝聰石橋月閩嶠松松長青月行空夫是之謂松月翁得祿藏主請住溫州九峰觀音禪寺木之有本水之有源孽芽至于錯節蟠根濫觸至于沃日滔天曾何心於應世豈有意乎持權得其祿得其壽亦人天之小果有其體有其用非父子之可傳破沙盆零敲碎打苕帚樁七穴八穿誰知正法眼滅向瞎驢邊湖州仁王橖長老請馬祖一喝百丈耳聾睦州一拶雲門腳折有際天之雲濤可以容吞舟之魚有持世之風輪可以駕摩霄之翮大用現前不存軌則金香爐下崑崙甓社湖中明月盡情分付與仁王打刀須是邠州鐵平江太平簡長老請身心一如身外無餘百草頭邊誰名彌勒三家村裏無二文殊有時指洞庭七十二峯化為真金美玉有時攪太湖三萬六千頃盡作醍醐太平本來無象何須特地塗糊酒美從來無僻巷醋酸不在大葫蘆鴈山慧日安長老請心如冷灰言如枯柴平如鏡面嶮似懸崖咬破東山鐵餕餡百味珍羞一時具足拈