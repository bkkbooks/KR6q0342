相如歸白璧無心罔象得玄珠汝師黃蘗非吾事慎勿瞋拳築大愚送蒙侍者酷暑如焚坐甑中略無餘暇話西東翠巖留得眉毛在玉几惟增耳竅聾大道可求宜日損聖心須養合泉蒙諸方知識還知否此是吾家大小空贈運維那道在人弘要力為蘗雖云遠尚堪希庭前柏樹當成佛洞裏桃花有此枝待得克賓心肯日是他興化令行時鄮峯全沒鄉情在擬把黃金鑄子期寄保寧倫仲芳天風吹起佛巖雲出自無心逈不群龍窟騰翔三級浪鳳臺飛舞九苞文梅洲春暖花如雪室年深肉尚溫伯仲塤箎時迭奏人間何處不知聞送句侍者之金陵樹倒藤枯笑不休布單賣却沒來由一毛頭上金獅子五百𦚾中活馬騮白鶴明邊珤公塔青龍翔處帝王州秋風影裏飛禪錫靜聽寒潮打石頭贈祇園澤蘭州瑞世優曇粲異芬潯溪一脉出曹源平分風月雲峯頂仄布黃金祗樹園佩肘後符欺佛祖亞摩醯眼耀乾坤莫嫌地褊難容舞風穴楊岐道自尊謝玉山西堂䊋塑開山龕像道傳京兆翠微師五百年來老古錐目有重瞳光爍爍手垂過膝坐巍巍石從空裏依何立玉隱山中始發輝露出團團無縫塔雲峯增重虎添威寄金山即休和尚我認并州作故家師兄塗毒不停撾泥牛兩兩鬪入海幽鳥喃喃罵落花積翠道高珠絶纇寂音名重玉無瑕先師付囑休忘却爛嚼虗空莫吐查贈承天鑑藏主曹溪佛法絶廉纖對蜜何須更說甜拈出金剛圈子看何如𨍏輅鑽頭尖衝開白浪千里衆跳上青天三足蟾好向威音前一鑑當陽捲起夜明簾次韻贈詗書記遊兩府坐斷慈明片舌頭老婆勘破有來由草菴未結孤峯住金錫先從兩府遊萬仞崖前騎駿馬千層水上掛燈毬上人智辨難酬對只借毗耶一默酬怡侍者歸天衣兼簡斷江和尚借竺源和尚韻年開九十斷江翁宴坐蓮峯古梵宮莫謂烹金爐鞴冷直教冀北馬羣空時聞鐘杵千峯月靜聽松吟萬壑風為我殷勤問無恙若耶溪北鑑湖東贈見西堂參春雨菴頭老和尚春雨菴中碧眼胡烹金尚有昔時爐龜毛兔角盈籌室蛇足鹽香滿道途酒美豈拘深巷陌醋酸不在大胡蘆吳中散席歸參禮也著防他棒喝粗送安懺首歸下竺依玉岡法師慈雲法席喜重開今代彌天老辨才寶塔涌從金地出靈峯飛向竺天來悟公焚體空留像賢士翻經尚有臺此去開科據高座平分風月振衡台送祿藏主遊福州蜃海通潮若坦途蠻艚不怕浪花粗東西兩塔城中有鼓角一樓天下無彼土鄉音還用譯上人道價不須沾荔枝橄欖羊萄橘栗棘金圈不似渠送毅上人參竺源和尚子去天台禮石橋不逢知識不甘休當知良遂參麻谷也學雲門見睦州紫籜山高宜努力仙源水急可乘流隨身竿木須牢把路滑隄防是石頭陳希顏過訪次韻酬之𦚾中書傳富縱橫咫尺蟾宮不肯登高臥樓頭隱君子來看溪上閉門僧春山消得幾䩫屐夜雨難忘十載燈彼此暮年間不徹莫言林下見何曾了心上人之四明台鴈了得此心方穩坐此心未了走西東携過頭杖六七尺行未識山千萬重明越台溫龍象窟天香瑞雪旃檀叢參取永嘉老禪將一輪江月照松風贈承天遠藏主遊浙東日出日入王國土溪東溪西王水草深固幽遠無人到須信平常心是道如來藏裏摩尼珠光明赫赫照昏衢平生受用只者是不妨推出司南車和古林東州為了菴頌墨迹宗師提唱立雄關拈却門前大案山爐炭鑊湯成正覺刀山劍樹只如間休居提起金剛鑽本覺舒開鐵面顏甘露二門雖久杜潮生合浦見珠還贈靈隱濟藏主眼竪摩醯肘佩符無星稱子定錙銖剖開竺國山中玉收取如來藏裏珠略露慈明橫水劍不携麻谷入園鋤道人千里同風句白紙無端黑字書吳淞舟中此行乘興泛吳淞誰是忘機海上翁落日潮生千浦浪歸帆天送一江風半鈎涼月蒼茫外數點青山杳靄中遙想故山溪上路秋風開遍玉芙蓉寄西林椿長老道聲籍籍類玄沙不出飛鳶見作家據坐西林開虎穴親從法海拔鯨牙木毬暖氣猶堪輥石鼓清聲足可撾老我江湖無可贈三千里外摘楊花贈諾藏主鷲峯鶴立象龍斑人物昂昂駭衆觀雲夢𦚾吞無楚澤烟波眼濶小吳山罰錢設供瑤鋪席問字酬僧珠走盤潦倒不行船子令棹歌聊當碧琅玕悼明極俊禪師一生更槎丫鈍置凌霄箇老爺擘破華山撾鐵鼓耕開東海種瓊花翻身獅子無蹤迹戴角於菟不露牙前輩凋零空歎惜只今誰是指南車謝懋藏主蒲鞋雲林袖出睦州蒲奉母之餘又及吾靈運登臨幾緉屐子喬來往一雙鳧王門珠屐人間有御榻麻鞋世上無軟他何妨長赤腳老僧留得伴跏趺承天震侍者禮祖祖庭虎踞與龍蟠撥草瞻風子細看少室千年無影樹黃梅七百爛泥團鴨飛拽脫雄峰鼻雞唱豁開圓悟關八十四人俱按過西江一吸直須乾仁王橖長老三到衲僧大用正當權栗棘金圈任吐吞日面佛同月面佛仁王尊即法王尊昔年同飲小溪水三度來敲真淨門賴有祖翁家業在金香爐下䥫昆侖和天泉別岸偈贈華藏壽維那遊浙東江南江北浙西東一錫飄然去興濃傾出天泉三萬斛借他別岸一帆風補陀海涌三更月方廣時聞半夜鐘直到詎羅蹲坐處千尋湫頂掛飛龍贈雪峯仁靜菴歸閩同飲連川江上水三千里外偶相逢飛來雪嶠聖箭子何似楊岐栗棘蓬出嶺時當梅子豆到家恰是荔枝紅有人問及松和月白雪蒙頭一老翁寄安長老出世慧日芳名躍出盡歡呼罔象無心自得珠千丈靈湫作甘澤一輪慧日耀昏衢巖西老子肉猶暖春雨禪翁德不孤遙想爛撾塗毒鼓聲聞百越與三吳和仁王長老從教草滿法堂前千里銀蟾共一天未可磨磚期作鏡且先博飯學栽田馬師一喝聲猶在百丈重參話始圓魯祖見僧長面壁知音惟有老南泉贈答失蠻百川海大師佛法玄機深似海百川日夜競奔流魚龍蝦蟹知為命蚊蚋修羅飽即休不必多求如意寶只消掣動六鰲頭千波萬浪中游戲收取珊瑚月一鈎本覺順藏主携了菴仲謀提唱求擕李單提鬼見愁池陽拋出百花毬阿爺誰似休居叟生子當如老仲謀石火電光中出沒拳來踢去轉風流百川來往傳消息萬里長江一葉舟悼龍翔笑隱廣智全悟禪師四住名山暢本懷龍河深處駐浮杯廣開智海傾甘露全悟玄門震法雷談塵正橫俄墮地勝幢高竪忽驚摧等間一笑翻身去潮撼空城喚不回贈承天茂雜那江西禮祖且喜大事已了畢何須向外別馳求翻身藥嶠真獅子露地溈山水牯牛破布衲中藏至寶銅砂羅裏滿盛油風前普請施三拜八十四人俱點頭贈萬壽通藏主回維揚會得瞿曇那一通四方八面自玲瓏三千剎海光明藏二十四橋楊柳風詩卷擲還禪月老角聲喚醒太原公瓊花端的非凡種收拾天香入袖中送育王瓊藏主洞徹吾宗上上機倒拈禿帚𦘕蛾眉平生懷玉誰能識定力如山不可移圓悟會中睡虎子南陽門下鳳凰兒他年曲彔禪牀上痛罵曹溪老古錐贈育王琪藏主經歸藏與禪歸海海有經兮藏有禪掇轉南辰安北斗移將東土向西乾真身設利垂千載大覺遺風數百年今日因君過溪上此心又到鄮峯前贈靈隱敬藏主瑞世奉化太清宰官明足察秋毫藪鳳郊麟不可逃未有長行而不住必須就下始升高祖師自有真鈯斧王庫初無如是刀七十二汀烟水碧高提兔角與龜毛贈東林藏主歸海東廬山面目也尋常見後精神覺老蒼十八高賢𨍏輅鑽五千餘卷鉢羅娘幾年蝶夢家常到萬里鯨波葦可航梵語唐言都會得更無一法可商量和元叟和尚贈安藏主草年說法坐凌霄栗棘金圈恣意拋木馬泥牛絶消息釋迦彌勒可論交為人幾下蒼龍窟信腳踢翻金鳳巢戴角鐵蛇鑽不入看他火後一莖茅平江幻住立菴主求幻住禪翁有幻孫亭亭玉立振斯文圓伊三點摩醯眼峭峻一方甘露門密檀林師子住稜層石塔白雲屯乃翁餘烈遺風在不吝慈悲接後昆燈上人禮祖蒲鞋挂向睦州城千載巖前續夜燈馬祖駒兒才𨁝跳楊岐驢子弄蹄行東林尚有栽蓮叟南嶽今無煨芋僧虎穴魔宮遊歷遍歸來拗折一枝藤徑山然書記歸溫州浩然英氣塞坤維雪竇門中一足夔蘇子墨池供草聖劉郎桃樹長孫枝鴈峰列石增奇秀驪頷明珠璨陸離積翠寂音絃可續叢林草木亦華滋送龜峯運維那當年癡絶在龜峰接得曹源一脉通海闊任教鰲轉側天高容得鶴飛沖於吾道愧雄峰祖羡子名同斷際翁捷出橫翔宜勉勵從來閩蜀本同風梅嶺南作無盡燈燈中有鏡燈無盡鏡外無燈鏡亦羞十法界分千法界一神洲照四神洲須彌常作光明炷海水頻添智慧油縱使毗嵐吹不滅禪翁心似月輪秋道場意無極裝觀音諸天大士分身二十天互為主伴下塵寰珠瓔危坐金剛石甲胄新排玉筍班說法慈容如月現摧魔寶杵迫人寒瑤池席上功無極五色光芒照碧瀾送空上人拜獨孤和尚塔鷲峰普覺老菴頭夢逐錢塘江水流福慧兩全千事足死生二字一時休龍吟枯木瑤泉冷猿嘯空山玉樹秋鍬子橫擔扣靈塔刻舟何處覓吳鈎何山鑄鐘聽得鯨音出小溪重興禮樂在斯時羅睺擊處驚群聵元亮聞時皺兩眉殷殷地雷停苦趣寥寥霜韻振清規竺乾青石今無恙空想拘留調御師寄德孤雲獎鰲山安雪心三藏主菁峯蒼翠石房幽鼎足分來互唱酬汾水六人成大器東山三佛是同流經歸藏也禪歸海弓學箕兮冶學裘商略钁頭邊事了同時踢出百花毬送靈石和尚歸天台彌天聲價似黃鍾萬衲歸依擁象龍大振玄綱超聵祖力行古道起中峯永明的旨一湖水天下宗師百歲翁白雪調高誰敢和且同寒拾撫孤松謝斷江和尚遠送我來三拜大梅常鼯鼠聲中夢一場仙去難追梅少府虎亡常護鄭襄陽竹輿伊軋羊腸路布帽稜層鶴𩯭霜舞袖不須嫌地褊松花千載有餘香贈仰山令藏主令名令聞見清標佛法于今未寂寥甘露室中百花醴集雲峯下四藤條朅來吳越尋知己未跨船舷贈痛橈莫怪空疏無咂啖春風春雨正蕭蕭送僧禮祖江東西與湖南北卵塔千丘與萬丘鼓簸箕唇多馬祖弄撈波子少巖頭西山走入滕王閣黃鶴踏翻鸚鵡洲打失眼睛拈得鼻騎牛不必更尋牛兔角杖長長兔角堪為杖月裏姮娥手自栽種出中山多狡獪根非下土可滋培桂輪萬里推將去太華千重卓得開老倒芭蕉提掇處有無與奪驗方來龜毛拂龜背刮毛宜作佛談玄不較短和長掛時魔佛俱藏六竪起人天聽舉揚擊碎玄關明悔吝敲成吉兆絶承當趙州受用應無盡末後猶將寄趙王贈中竺榮藏主千歲巖前瞌睡虎金陵臺上鳳凰兒騰身時展九苞瑞開眼光搖百步威不墯諸方金網密須防平地錦機危翱翔遠舉高千仞管內全班未易窺送郁侍者省師小玉頻呼處欄雞為發機只教迦葉會不許老胡知唇水濤如雪台山月似眉途中得力句歸問鹿城師答源藏主會住定水識得祖師金矢法角䭾卸却籠頭脫截流自是香象王烈焰豈容蚊蚋泊甬東開士能崛奇芒繩要把虗空縛知是般事便合休驢漢更待何時瞥伽陀寄我約秋來劇談拌得禪牀折石頭路滑知不知牢著腳跟防喫攧送明禪人明明百草頭明明祖師意伶俐漢撩起便行憧底只管瞌睡皓玉無瑕明珠絶纇草鞋乾晒待秋風寸草不生千萬里送宗藏主歸里有句無句藤倚樹放下泥盤笑不住是真獅子便咬人肯倚他門傍他戶道㳅器量古罍洗杖頭敲出虗空髓不同矮子賣布單虗走三千五千里罷參收拾歸去來大溈笑口不敢開閩中尊宿若具眼為君高築黃金臺寒巖二隱清凉金色峩眉銀兩枚漆桶徹骨貧一人眼睛重八兩一人鼻孔恰半斤五峯雙㵎松門路兩枚漆桶熏天富一人長拖獅子衫一人高繫象王袴老柳梢頭月半輪一箇拍手一指陳自家不省者箇意却道修行徒苦辛查筒打失無尋處苕帚拈來且相慰饒舌豐干去不來萬古清風一紈素送昱藏主歸鴈山省師藏裏摩尼珠古今人不識永嘉真覺師當陽曾指出白月即見白黑月即見黑智者不可求無心還自得晦初鴈山英韜藏最綿密一朝發現來大千俱照徹持歸呈阿師好事明明說公不見藕絲孔裏騎大鵬等間挨落天邊月伴雲室中贈玉侍者白雲本是無羈物冷淡為身間作骨或舒或卷或去留伴之者誰有明月道人心與明月同白雲故故來相從巖間相對兩無語慎勿隨逐東西風只恐道人出山去石上無人伴雲住道人若去雲亦忙月明彼此無尋處送本真侍者黃金真人鐵面具招不來兮推不去布毛拈却未曾吹金烏飛上瑚樹宗門中事非等間翻身直上百尺竿十方世界風颯颯炎天雪片飛漫漫中峯破砂盆松源生笤帚日午打三更面南看北斗剎剎塵塵甘露門物物頭頭獅子吼送發上人歸茶陵茶陵蹇驢攧折角千古清風動寥廓明珠一顆價連城虗空撼動黃金鐸上人家亦住茶陵西山之子鐵牛孫華亭江上見船子一橈之下波濤翻于今又唱還鄉曲為吾寄語茶陵郁滿目溪山古又今白雲絃斷何人續贈三椽菴主大廈千間單七尺平生受用人人得三條椽下作生涯誰是三條椽下客雪山六載無一椽鵲巢冠頂蘆穿膝少林九年沒把茅冷坐堆堆空面壁趙州拽下簾子去到頭不識菴中主兩箇泥牛鬪不回㗸花百鳥來無處掀翻三椽淨裸裸下無卓錐上無瓦百億乾坤蓋得周三椽從此增高價送蔣山果藏主禮寶陀大士法身等虗空大士悲心如大海世間欲以尺量空復欲持蠡測海水虗空可量海可測其人即與大士等一毛端上無邊身一一身毛剎塵海拈出志公古刀尺處處盡是圓通門收得摩尼藏裏珠不屬中流及彼岸磐陀石上日輪紅大士法身全體露遊張公洞用天師韻贈陳景山谽谺古洞天風凉錦屏玉節搖金光千年靈官笑迎客銀髯丹臉修眉蒼扳危歷覽忘初步仙翁飲我瓊花露一聲何處鳳凰鳴玉童遙指烟霞路應真過海圖海門萬丈洪濤舂水府隱現漩渦中綵旌羽葆搖空濛金釘朱戶光玲瓏龍君海若俱肅雍奉送十八出世雄不論殿後并先鋒一踏玉麈誇神通一擎寶塔碧兩瞳一揮羽扇揚清風一軍持現樓閣重一杖卓立赤鯶公一側風帽如張蓬一老盤坐舁鬼工一提貝多乘青𩣭一躡獅子頭髼鬆一坐炊巾衣頂蒙一披禪衲立鮎衝一弄寶珠玩蒼龍一坦便腹抉二童一卓金錫象力克一將到岸鱷如虹一踞羊車行忩忩一跨斑斑老大蟲一焚熏陸香蒙茸山靈出迎䖍且恭武夫甲胄來憧憧方廣聖寺鳴昏鐘木杪高挂金鐙紅𤠔猱虎豹喧巖叢隊伍直入天台峯回顧阿耨琉璃宮珍重娑竭厖眉翁送仰山印首座歸蔣山正法眼藏瞎驢滅祖師心印鐵牛機𤥖公觀音十二面集雲峯下四藤枝何如睦州擔片板是亦剗兮非亦剗靠倒雲門一字禪掃却臨濟四料揀朝離𤥖席暮鍾山盤走珠兮珠走盤一拳打透圓悟關鷹巢飛出黃金鸞題牧松軒道人牧松不用鞭抱甕灌以巖西泉向來毫末今出屋倐忽偃蹉凌雲天臨軒萬本青如黛瑟瑟濤聲起虗籟婆娑繞樹時撫摩人與松兮今老大道人只怕松化龍松間結屋巢寒空千紅萬紫隨春風歲寒相伴惟髯翁送仰山性藏主回徑山雲騰芬始膚寸倐氤氳來從獺徑聚擁龍門挂空如有蒂抱石本無根靜則岫盈谷滿動則電掣雷奔何當為雨為霖去直得三千海嶽昏示應侍者善應無方大功不宰呼兮應兮無在不在類虗谷之傳聲廓大千而無礙指月話月兮誰是傍觀拈花笑花兮十分光彩禪石歌贈江心安藏主少林一片安禪石風吹不入雨不濕祖師冷坐一九年猛省忽從空裏立五百力士揭不動䂭䂭磝磝沒稜縫藍田曾誤李將軍一箭發機隨手中一斑已露呈牙爪奮迅過如獅子吼蜃江江上出頭來驚得陝府鐵牛顛倒走松月菴歌吾有一菴曰松月為愛歲寒拜皎潔不拘南北與東西有月有松即休歇撫松問松松不言舉頭問月月在天拾枯煮瀑邀明月我心與月同孤圓冰輪常繞須彌走擎來不假修羅手缺時圓處光不分圓時缺處光何有永嘉證道曾有辭江月照兮松風吹寒山靜聽聲愈好馬師賞玩增光輝有誰識得菴中主無去無來無所住去來恰似月行空住著猶如風過樹此菴無壞亦無成於中只麼老此生松花採摘飢可食桂子飄灑香風清分明一片清涼國松自青青月常白傳家清白是此歌堪與兒孫為軌則無為軒銘佛身無為不墮諸數卓爾常存迥然獨露祖師西來兩手分付淨智妙圓真功德聚八窗玲瓏萬象行布二六時中行住坐臥不事面壁亦不觀樹迷未嘗迷悟亦非悟白雪匪歌陽春寡和如虎之缺如馬之𮩴室內之牀戶外之履往者不追來者不拒兔角不拈龜毛不竪大坐當軒了無回互作銘者何一詞不措養正室銘存吾真養吾正柔吾剛折吾徑履坦途防機穽任世緣懶奔競持吾戒守吾定空吾心見吾性月之明風之靜春之和冬之凝玉之溫泉之瑩竹之清松之盛樂吾間適吾泳慕前賢仰諸聖養者何毗耶病正者何摩竭令安厥居續慧命摩尼珠大圓鏡漁家傲拜遠法師大法千鈞承重寄匡廬萬仞增蒼翠黑白三千龍象隊真堪愛過溪大笑無人會佛運澆漓當像季覩師面目猶生氣一勺聰明三昧水深無底甘涼滴滴醍醐味送藻侍者鴈山省師巍巍鴈宕峯舉手天一握西菴老禪虎據坐如山嶽白日鼓雷霆青天飛雪雹佛手未易窺先且伸驢腳衲子每登門森嚴難湊泊上人跨竈兒應機猶啐問子何方來拈出當頭著棒喝縱交馳頎然活卓卓獅子貴翻身犀牛露頭角一語忽相投可解千生縛歸來舉似儂萬象鳴嚗嚗靈隱化藏主送天瑞老和尚語録贈之上人來自靈鷲峰手擎兩朵青芙蓉佛慧老人五會録夜光貫月如長虹我本無心有希冀今此寶藏何方至普覺師兄結集時此特太山一毫耳無端印板上脫來龜毛兔角空中栽從前了無元字腳平地忽爾生崔嵬焚香展拜從頭讀緬想不曾編此録胡為列在門弟行天瑞家風遭屈辱寄言鷲嶺老西菴千鈞重寄一擔擔退藏於密袖老手天生鼻孔誰司南上人乃是菴之嗣豹隱一斑曾未露祖禰不了及兒孫他日大方看獨步振寮元持淨求警䇿執持糞器著斃垢衣入淨入穢入水入泥日用常行三昧發揮古德風規趙州東司頭不說佛法狼籍不少湛堂指甲上放光動地誠不自欺生苕帚破糞箕得便宜是落便宜這般標致誰相似靈鷲山中有隱之為恩維那說義海偈普賢百萬毛孔中一一毛孔香水海於中演說三昧門各具無量微妙義海水可知其滴數微妙義理不思議阿修羅王立半身其頂亦與須彌等採花釀作甘露漿萬水千波同一味一切鯤鯨及魚龍沾其味者皆充滿一沾其味無異名恆河沙義咸通達稽首普賢大願師微塵義海同遊戲道藏主遊五臺六月臺山飛雪片白日深潭鼓雷電玻瓈盞裏素濤翻攝身光內金橋現此行要見七佛師袖裏自有摩尼珠清凉石上萬菩薩不知那個真文殊前三後三是多少切忌揮侖吞箇棗問渠明白記將來百萬人前獅子吼借楚石了菴韻贈藏主密說顯說遮詮表詮惟行中道不墮二邊不在坐禪成佛豈用作鏡磨磚千七百則且非祖師之語一大藏教亦非如來之禪胸吞雲夢八九眇視十聖三賢蚯蚓驀過東海蝦蟇跳上梵天放出溈山水牯耕翻祖父田園有縱有奪無黨無偏棒如雨點喝似風旋檇李山中二禪將了無一法與人傳和元叟和尚擬寒山三首我見世間人利名日交接二鼠每侵藤四蛇常在篋要得脫苦輪三生六十劫廣額放屠刀滅却三途業參禪并看教迷悟千萬般常啼學般若何須賣心肝賢愚同一揆僧俗互相瞞十步九喫攧方知行路難菩薩不猒喧二乘墯空寂豐干騎虎來拾得指羊跡題巖千偈多照水雙瞳碧不貴萬戶侯豈羡二千石和北澗曹溪見柳春工造化本無私草木萠芽類小兒今日曹溪看柳眼枝頭點綴似圓伊峯藏主血書華嚴經塵說剎說熾然說無邊香水血淋漓雜華林內紅如錦五十三人醉似泥血書金剛經四句偈勝七寶施祗園會上百華春須知大士書經血流出如來忍辱身任子敏州判二鼠圖朝三暮四衆狙喜怒蘿白荔丹二鼠交勸千鈞之弩藍田射虎誰為此鼷而輕發機北澗和尚送柏庭法師序台衡重寄柏庭老黼黻宗門室翁二老風流無復見惟聞大呂與黃鍾康上人血書華嚴經破一微塵出大經血痕腥汗百餘城善財南去無消息啼斷春山杜宇聲聽松軒淨洗山林耳微風起泬寥舒徐動天籟澎湃震春潮鶴夢驚清響龍吟奏古韶聞中有真趣愛此歲寒標贈金山及藏主金烏玉兔如梭急八駿如何追得及滔滔楊子大江流夜半穿靴水上立龍宮海藏盡豁開赤手抉得摩尼珠萬仞龍門一躍過不假霹𮦷轟春雷者回重入德雲室不用參尋經七日金鼇背上掉臂行盡得真人好消息題跋四祖與栽松道者立談圖兩翁相對話無生各要尋條活路行千載流傳到今日有誰來此聽松聲六祖墜腰石龍朔年深色愈蒼墜腰踏碓意非良賊身已脫黃梅渡千古空存舊賊贓明教大師墨蹟明教禪師闍維不壞者五曰頂曰耳曰舌曰童真曰數珠非夙承悲願弘法拯難曷能爾耶當其皇祐至和間群儒鋒起力拒吾道微禪師火其書廬其居人其人者久矣豐功碩德與吾佛化九十六種外道吾祖破六宗邪見無以異今觀親書送周感之入京詩序雖經數百年老舌熾然如無恙時而墨妙嚴正如其人焉奯藏主得之於六花峯烈焰之際不翅如獲輪王髻中之𤥖愚謂縱使火之當如百煉精金光焰萬丈與五種不壞者同傳大慧禪師衡陽示密首座帖妙喜謫居衡陽草堂和尚專書慰問有道盛則魔旺城高則衛生之語老師答曰自到衡陽一向謝絶賓客四方書問一切闊略獨於吾叔祖未能忘懷蓋其達人大觀不以患難二其心也密首座久侍老師即編集正法眼藏曰沖密者因其回浙囑其須見何三公夫婦二人蓋亦嘗入師室問道者而老師未能忘懷也紹興至今二百餘年墨光爛然銀鈎鐵畫如渴驥奔泉怒猊抉石老氣益壯所謂機辨迅雷霆語言粲星斗荷佛祖重任臨濟正宗舍師其誰歟曾德符棨送佛照住徑山序佛照禪師移住徑山以聖眷勉為此行固辭不可道出山陰訪故人曾德符侍郎話及此意曾作序贊其行觀此豈似今時以攙攘為本色以鬪諍為正宗水潑不去挺逐還來略無廉耻使法門同受斯辱聞先哲遺風餘烈寧不愧死德符云惟大慧方可罵真歇拙菴方可來徑山斯言旨哉真歇和尚墨迹古人住院不拘大小貴在得時行道而已今觀真歇老人勸請一尊宿住護國之帖為法道危急之憂故拳拳勉諭見於真情也或曰所請者乃是竹菴恐傳者之訛矣考之真歇住江心時竹菴奉詔開山鴈宕能仁真歇恐竹菴緣法未熟特過江迎歸方丈待以師禮由是緇白翕然歸敬蓋竹菴自鼓山赴能仁之招請住護國者非竹菴明矣信藏主出示此卷命題不容不辨別峯塗毒墨迹別峯禪師贈敏知藏偈塗毒與勇維那帖二墨寶獲披覽於二百年後不特寶其語言三昧實尊其道德行解相應也塗毒住徑山別峯居海門菴末後一著了然明白而塗毒臨示寂受七日生祭二大老皆十地中人也余晚生恨不及見追想遺風餘烈為之悚然癡絶和尚赴法華請示專使長偈王荊公以半山請真淨開山范忠宣公以天平請浮山圓鑑開山趙京尹以法華請老癡絶開山皆一時盛事也癡翁於毗陵舟中為衍專使書此長偈衍之一行非惟不辱命又且虗往實歸所得多矣靖思癡絶老人高臥玉山一旦以佛法大事靖退小節幡然為法華而起使法華增九鼎之重吁古道顏色今不復見稗沙門不揣其本趣媚權勢盜竊名器裨販如來欲求宗風之振法運之興其可得乎破衲首座寶此其有以也夫又龕陰墨迹豫早年入衆時聞之老宿癡絶禪師見曹源和尚有所契悟後曹源令小師禮藏主持法衣一頂密而隨之不使其知待他出世若拈我香將衣對衆付之禮一依所囑二十年後老癡出世嘉禾天寧一香為曹源拈出禮捧衣具陳遺言癡翁下座接衣哭為之慟見者聞者莫不感歎流涕不惟弟子求師之難而師求弟子尤難也今觀墨妙敘平生出峽見人至于入寂從上所供竝皆詣實師示寂于宋淳祐庚戌時年八十有二終于徑山此段因緣行狀中不收豫姑以所聞書于卷后異時僧中秉董狐筆者有所取焉應菴和尚與烏巨書應菴老祖示衆云三十三州七十僧驢腮馬頷得人憎諸方若具羅籠手今日無因到淨明當時會中龍象如資福詮烏巨逵輩亦不少一書與資福見於録中一書與烏巨即此書也老婆心切直是說得血渧滴地使今時稱長老者讀之寧無尸素之愧愚自雲間來主斯席遍禮山中諸祖塔廟至直菴祖師塔下瞻禮老應菴遺像於影堂乃是為烏巨所贊者有云一句掀翻萬機罔措更提拄杖擊塗毒鼓立禪持歸分付烏巨即直菴出世之地直菴遷國清密菴師祖繼席後直菴再至祖為上堂舉芙蓉訪實性因緣激揚此事力行應菴之道謂二難也直菴終于何麓窣堵波巋然松竹森父子面目如生惜乎應世機緣無所記載豈非當時門庭高峻不許記録抑弟子不為流通有此失耶四明年藏主出此書命題不肖忝中峯五世辭不獲三復感慨焚香九拜而為之書山谷贊祐禪師墨蹟山谷老人深得吾宗佛祖禪髓故其真贊如電掣雷奔風起水湧向髑髏中豁開摩醯頂門三隻豈止奔魑魅走狐狸而已直得天下老和尚倒退三舍也放翁法華顯應録序嘗觀裴相國圓覺經序蘇翰林楞伽經序真輔教之文也今觀放翁陸先生法華顯應録序有云天地不足以喻其大海水不足以喻其深可謂知言矣回視排佛毀法謗僧至死不悟者何如哉古德提唱直為激揚從上一著發越學者初無注意造作安排句語其於言有精深卓絶渾然天成處蓋出於自得真正發為音聲者也昧者不知往往反是脫例如此尚何有於單傳直指之道云哉哉今觀月江師兄語要一出格外生機洞徹古德肺腑殆不讓善於其間但恨天瑞老人不見之耳丁巳夏四月六日東林辱弟紹義敬題月江和尚語録蓋中峯下四世孫所說法也然光明盛大之傳而至於此善觀之者則天瑞之門大而無外不然則被黑豆法淹殺眼矣時至治二年夏五淡湖清茂題祖師直指單提一心上乘之法青天霹𮦷旱地風濤拂子頭上突出百億金師子彈指一下驚倒百億須彌盧月江和尚七出八沒千變萬化步驟林際宗風顯露楊岐眼目具大知見真藥現前者鹽鹹姜辣定知開口不在舌頭上至治壬戌夏首淨慈徑海敬題月江余法屬中橫曉太白久饜聞其四布薌名至元乙亥孟夏南寓雙檜得觀六會語乃合十曰天瑞兄之衝煙樓跨竈者哀法道幾絶之念釋然前淨慈屬末靈石如芝書達磨板齒生毛危骨撾却來石上種油麻游梁歷魏成何事孤負寒蘆幾度花育王正印為張道善請贊
