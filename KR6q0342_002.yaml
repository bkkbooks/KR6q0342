body:
  text: 拈古溫州路慧日禪寺住持門人祖安編舉德山示衆云今夜不答話問話者三十棒時有僧出禮拜山便打僧云某甲話也未問山云你是甚處人僧云新羅人山云未踏船舷好與三十棒法眼云大小德山話作兩橛圓明云大小德山龍頭蛇尾雪竇云二老病雖善裁長補短捨重從輕要見德山亦未可在何故德山大似握閫外威權有當斷不斷不招其亂底劒諸人要識新羅僧麼只是撞著露柱底瞎漢師云德山老漢一條白棒佛來也打祖來也打等間被新羅僧拗折了也法眼圓明各出隻手只救得一半雪竇云要識新羅僧麼只是撞著露柱底瞎漢增他多少威光還有為德山作主者麼舉雪峰一日普請自負一束藤路逢一僧峯便拋下僧方擬取峯便踏倒歸舉似長生乃云我今日踏者僧快生云和尚替者僧入涅槃堂始得峯便休去雪竇云長生大似東家人死西家助哀也好與一踏師云雪峯貪觀天上月失却手中橈長生借手行拳雪竇潑油救火總是賊過後張弓舉百丈再參馬祖侍立次祖以目視禪牀角頭拂子丈云即此用離此用祖云爾他後開兩片皮將何為人丈取拂子竪起祖云即此用離此用丈挂拂子於舊處祖便喝丈直得三日耳聾雪竇云奇怪諸禪德如今列其派者甚多究其源者極少總道百丈於喝下大悟還端的也無然刁刀相似魚魯參差若是明眼漢瞞他一點不得只如馬祖道爾他後開兩片皮將何為人百丈竪起拂子為復如蟲禦木為復啐同時諸人要會三日耳聾麼大冶精金應無變色師云獅子教兒迷子訣馬祖有之百丈直得三日耳聾美食不中飽人喫雪竇云大冶精金應無變色好與一喝舉崇壽指凳子云識得凳子周匝有餘雲門云識得凳子天地懸殊雪竇云澤廣藏山理能伏豹師云雪竇與麼道要且不識凳子舉永嘉大師到六祖繞禪牀三匝振錫一下卓然而立祖云夫沙門具三千威儀八萬細行大德從何方而來生大我慢雪竇便喝云當時若下得者一喝免見龍頭蛇尾又再舉繞禪牀三匝振錫一下卓然而立代祖師云未到曹溪與你三十棒了也師云永嘉龍門上客六祖東閣大開千載一時風雲際會雪竇代永嘉下者一喝又代祖師云未到曹溪與爾三十棒了也不妨奇特且道二大老還甘麼舉仰山指雪師子云還有過得此色者麼雲門云當時便與推倒雪竇云只解推倒不解扶起師云雲門推倒雪竇扶起要見仰山較三十里舉香嚴垂語云如人上樹口𠾑樹枝手不扳枝腳不踏枝樹下有人問西來意不對則違他所問若對又喪身失命當恁麼時作麼生即是有虎頭上座云上樹即不問未上樹請和尚道嚴呵呵大笑雪竇云樹上道即易樹下道即難老僧上樹也致將一問來師云香嚴把定牢關不通水泄若非虎頭上座出來安得話行千古育王敢問雪竇和尚上樹也只恐下不得舉僧問魯祖如何是不言言祖云爾口在什麼處僧云某甲無口祖云將什麼喫飯僧無語雪竇云好劈脊便棒者般漢開口了合不得合口了開不得師云者僧籠頭蛇尾當時待他道將什麼喫飯但道他不飢喫什麼飯雪竇老人到者裏有棒也無施展處舉僧問雪峯古澗寒泉時如何峯云瞪目不見底僧云飲者如何峯云不從口入僧舉到趙州州云不可從鼻孔裏入僧却問趙州古澗寒泉時如何州云苦僧云飲者如何州云死雪峯聞舉云趙州古佛從此不答話雪竇云衆中總道雪峯不出者僧問頭所以趙州不肯如斯話會深屈古人雪竇即不然斬釘截鐵本分宗師就下平高難為作者師云鑽龜打瓦激濁揚清坐斷天下人舌頭不無雪竇要且不知古人相見處還知雪峯趙州麼得人一牛還人一馬舉僧問西堂和尚有問有答賓主歷然無問無答時如何堂云怕爛却去那僧問長慶有問有答賓主歷然無問無答時如何慶云相逢盡道休官去林下何曾見一人雪竇云何不與本分草料師云一人截斷衆流一人隨波逐浪一人函蓋乾坤有問育王有問有答賓主歷然無問無答時如何只向道賓主歷然免見者僧奔南走北舉臨濟示衆云我於先師處三度喫六十棒如蒿枝拂相似如今思一頓棒喫誰為下手僧出衆云某甲下手濟拈棒與僧僧擬接濟便打雪竇云臨濟放處較危收來太速師云臨濟大似貧兒思舊債可惜當時放過待他拈棒便與掀倒禪牀臨濟必然向明窗下安排雪竇云放去較危收來太速頭上著枷腳下著杻舉欽山一日上堂竪起拳又開云開即為掌五指參差復握云如今為拳必無高下還有商量也無一僧出衆竪起拳山云爾只是箇無開合漢雪竇云雪竇即不然乃竪拳云握則為拳有高有下復開云開則成掌無黨無偏且道放開為人好把定為人好開也造車握也合轍若謂閉門造車出門合轍我也知爾向鬼窟裏作活計師云欽山藕絲孔裏開張世界雪竇大蟲舌上慣打鞦韆點撿將來總塞諸方口不得山僧則不然乃竪起拳云三世諸佛歷代祖師天下老和尚盡向者裏乞命復開云直得須彌岌嶪海水騰波十方世界風颯颯地忽有箇漢出來道和尚恁麼也只是箇無開合漢却許他具一隻眼舉僧問睦州高揖釋迦不拜彌勒時如何州云昨日有人問趕出了也僧云和尚恐某甲不實州云拄杖不在苕帚柄聊與三十雪竇云睦州只有受璧之心且無割城之意師云登山不到頂不知宇宙之寬廣入海不到底不知滄溟之淺深者僧放出三分軟頑睦州家私一時揣盡雪竇恁麼批判正是兔子喫牛嬭舉棗樹問僧近離甚處僧云漢國樹云漢國天子還重佛法也無僧云苦哉賴值問著某甲問著別人即禍生樹云作箇什麼僧云人尚不見有何佛法可重樹云闍黎受戒多少時僧云二十夏樹云大好不見有人便打雪竇云者僧棒即喫要且去不再來棗樹令雖行爭奈無風起浪師云者僧不從漢國來若真從漢國來棗樹有棒也打他未得在只是箇無地頭漢何以見得不見雪竇道去不再來舉趙州問婆子什麼處去婆云偷趙州笋去州云忽遇趙州又作麼生婆子便掌州便休去雪竇云好掌更下兩掌也無勘處師云趙州休去婆子勞而無功更下兩掌也是老婆見解舉保壽開堂日三聖推出一僧壽便打聖云漝麼為人瞎却鎮州一城人眼去在壽便歸方丈雪竇云保壽三聖雖發明臨濟正法眼藏要且只解無佛處稱尊當時者僧若是個漢才被推出便掀倒禪牀直饒保壽全機也較三千里師云保壽見兔放鷹三聖指鹿為馬滅臨濟一宗是者兩箇老漢雪竇雖有定乾坤眼擒虎兕機不知箭過新羅却向大唐等候舉僧問無業如何是佛業云莫妄想雪竇云塞却鼻孔又僧問馬祖如何是佛祖云即心是佛雪竇云拄却舌頭師云雪竇鼻孔無半邊舌頭不出口要與無業馬祖二大老相見三生六十劫舉僧問德山從上諸聖什麼處去山云作麼作麼僧云勑點飛龍馬跛鱉出頭來山便休去至來日山浴出其僧過茶與山山撫背一下僧云者老漢方始瞥地雪竇云然精金百煉須安本分鉗鎚德山既以己妨人者僧還同受屈以拄杖畫一畫云適來公案且致從上諸聖什麼處去大衆擬議一時打趂師云德山逢強則弱遇賤則貴者僧虎穴深探幾乎喪身失命雪竇也要入者保社未免旁觀者哂有人問育王從上諸聖向什麼處去只對他道棚八刺札舉保福簽瓜次太原孚上座到來福云道得與爾瓜喫孚云把將來福度一片瓜與孚孚接得便去雪竇云雖是死蛇解弄也活誰是好手者試請辨看師云孚上座如蟲禦木偶爾成文雪竇忍俊不禁徒誇好手會麼甜瓜徹蒂甜苦瓠連根苦舉南泉示衆云道非物外物外非道趙州出問如何是物外道泉便打州云和尚莫打某甲向後錯打人去在泉云龍蛇易辨衲子難瞞雪竇云趙州如龍無角似蛇有足當時不管盡法無民直須喫棒了趂出師云南泉前頭怕殺人後頭笑殺人雪竇道不管盡法無民直須喫棒了趂出救得一半舉洞山到雲門問近離甚處山云查渡門云夏在甚處山云湖南報慈門云甚時離山云去年八月門云放爾三頓棒山至來日却上問訊昨日蒙和尚放三頓棒不知過在什麼處門云飯袋子江西湖南便漝麼去山於此大悟雪竇云雲門氣宇如王拶著便冰消瓦解當時若據令而行子孫也未到斷絶師云雲門可謂還丹一粒點鐵成金至理一言轉凡成聖雪竇道若也據令而行子孫也未到斷絶説得道理好歸依佛法僧舉一僧參馬大師大師劃一圓相云入也打不入也打僧便入大師便打僧云和尚打某甲不得大師靠却拄杖休去雪竇云二俱不了和尚打某甲不得靠却拄杖擬議不來劈脊便打師云者僧已進不退馬師已展不縮者僧有嚙鏃之機馬師用欵兵之法雪竇雖欲盡令而行猶較馬大師三十里在舉興化問克賓維那汝不久為唱道之師賓云不入者保社化云會了不入不會不入賓云沒交涉化便打乃云剋賓維那法戰不勝罰錢五貫充設鑽飯至來日齋時興化自白槌云克賓維那法戰不勝不得喫飯即便趕出雪竇云克賓要承嗣興化罰錢出院且致却須索取者一頓棒始得且問諸人棒既喫了作麼生索雪竇要斷不平之事今夜與克賓維那雪屈以拄杖一時打散師云者箇公案古今批判者多還他雪竇是作家爐鞴雖然至竟不知興化舌頭落處須知者一分鑽飯非維克賓維那不得喫設使盡大地人到來不敢正眼覷著舉僧問長慶衆手淘金誰是得者慶云有伎倆者得僧云學人還得也無慶云大遠在雪竇代者僧當時便喝復云有伎倆者得一手分付有伎倆者不得兩手分付學人還得也無蒼天蒼天師云育王則不然衆手淘金誰是得者劈脊便棒非惟剿斷者僧命根且免雪竇後來拖泥帶水舉大慈示衆云山僧不解答話只是識病時有僧出大慈便歸方丈雪竇云大凡扶竪宗乘須辨箇得失且大慈識病不答話時有僧出便歸方丈雪竇識病不答話或有僧出劈脊便打諸方識病不答話有僧出必然別有長處敢有一箇動著大唐天子只三人師云大慈識病不答話時有僧出便歸方丈石火電光鈍雪竇識病不答話或有僧出劈脊便打壁立萬仞𡽗育王識病不答話若有僧出即下禪牀立還有辨得失者麼舉趙州到黃蘗蘗見來便關却方丈州云救火救火黃蘗便出擒住云道道州云賊過後張弓雪竇云直是好笑笑須三十年忽有箇衲僧問雪竇笑箇什麼笑賊過後張弓師云三箇老賊且道那箇是正賊具眼者辨取舉僧問鏡清學人未達其源乞師方便清云是什麼源僧云其源清云若是其源爭受方便雪竇云死水裏浸却有什麼用處侍者問適來成褫伊清云無侍事云不成褫伊清云無侍者云和尚尊意如何清云一點水墨兩處成龍雪竇云猶較些子雪竇不是減鏡清威光要與者僧相見是什麼源其源三十年後與爾三十棒師云將成九仞之山不進一簣之土者僧當時待鏡清道若是其源爭受方便只消禮拜便出豈不光前絶後鏡清既是勞而無功却向侍者邊重重納敗雪竇道三十年後與爾三十棒正是掉棒打月舉僧問香林如何是衲衣下事林云臘月火燒山雪竇云﨟月燒山萬種千般翹松鶴冷踏雪人寒達磨不會大難大難師云臘月燒山虎體元斑含元殿上休覓長安舉本仁和尚示衆云尋常不欲向聲前句後鼓弄人家男女何故且聲不是聲色不是色時有僧問如何是聲不是聲仁云喚作色得麼僧云如何是色不是色仁云喚作聲得麼僧禮拜仁云且道為汝説答汝話若人辨得有箇入處雪竇云本仁也甚奇怪要且貪觀天上既非聲前句後且作麼生入師云本仁道聲不是聲色不是色豈不是鼓弄人家男女入之一字也不消得雪竇云既非聲前句後且作麼生入著甚死急舉雲門示衆云世尊生下一手指天一手指地周行七步目顧四方云天上天下唯我獨尊當時若見一棒打殺與狗子喫貴圖天下太平雪竇云便與掀倒禪牀師云雲門雪竇要與釋迦老子把手共行要且出他綣繢不得舉國師三喚侍者雪竇云點即不到侍者三應雪竇云到即不點將謂吾孤負汝誰知汝孤負吾雪竇云瞞雪竇不得雲門云作麼生是國師孤負侍者處會得也是無端雪竇云元來不會門云作麼生是侍者孤負國師處粉骨碎身未報得雪竇云無端無端師云三喚負汝三應負吾蘇盧悉利悉利蘇盧雲門粉骨碎身雪竇赤心片片總未報得國師在作麼生報得遂喚侍者者應喏三十年後不得孤負老僧復舉僧問投子國師三呼侍者意旨如何投子云抑逼人作麼雪竇云垛根漢師云無啖分僧問興化化云一盲引衆盲雪竇云端的瞎師云又添一箇僧問玄沙沙云侍者却會雪竇云停囚長智師云認奴作郎僧問趙州州云如人暗中書字字雖不成文彩已章雪竇便喝師云彩奔齪家僧問雪竇雪竇便打師云孟八郎漢雪竇復頌云師資會遇意非輕無事相將草裏行負汝負吾俱莫問任從天下競頭爭師云間言語有問育王國師三呼侍者意旨如何即向他道枯骨裏覓什麼髓舉僧問智門和尚如何是佛門云踏破草鞋赤腳走僧云如何是佛向上事門云拄杖頭上挑日月雪竇云千兵易得一將難求師云踏破草鞋杖挑日月一將難求千車合轍舉師祖問南泉摩尼珠人不識如來藏裏親收得如何是如來藏泉云王老師與爾往來者是藏雪竇云草裏漢祖云不往不來者泉云亦是藏雪竇云雪上加霜祖云如何是珠雪竇云嶮百尺竿頭作伎倆不是好手者裏著得箇眼賓主互換便能深入虎穴或不漝麼縱饒師祖悟去也是龍頭蛇尾漢師云南泉順水張帆雪竇逆風把柂師祖前不搆村後不迭店有問育王如何是如來藏即向他道山斷疑無路溪回別有村如何是珠向道看腳下舉僧禮拜雪峰峰打五棒僧云某甲有什麼過峰又打五棒雪竇云雪竇不曾與人葛藤前五棒日照天臨後五棒雲騰致雨爾若辨得好與五棒師云前五棒石牛欄古路後五棒一馬生三寅雪竇能區能別有賞有罰也好與五棒舉馬大師令智藏馳書上徑山山接書開見一圓相於中下一點國師聞舉云欽師猶被馬師惑雪竇云徑山被惑且致若將呈似國師別作箇什麼伎倆免被惑去有老宿云當時坐却便休亦有道但與劃破若與麼只是不識羞敢謂天下老師各具金剛眼睛廣作神通變化還免得麼雪竇見處也要諸人共知只者馬師當時畫出早自惑了也師云一人居江西一人居浙西一人居南陽風馬牛之不相及因甚發一言惑亂天下人雪竇汗馬功高名不虗得育王敢問雪竇當時馬師圓相明什麼邊事舉鏡清問僧趙州喫茶去爾作麼生會僧便出去清云邯鄲學唐步雪竇云者僧不是邯鄲人為什麼學唐步若辨得出與爾茶喫師云者僧出去是會不會雪竇道不是邯鄲人為什麼學唐步殊不知者僧親從趙州來舉僧問雲門如何是法身向上事門云向上與爾道即不難作麼生會法身僧云請和尚鑑門云鑑即且致作麼生會法身僧云與麼與麼門云者箇是長連牀上學得底我且問你法身還喫飯麼僧無語雪竇云將成九仞之山不進一簣之土過在什麼處師云者僧當時待他道法身還喫飯麼只對道盡大地是飯和尚什麼處下口管取雲門倒退三千雪竇云將成九仞之山不進一簣之土在雲門分上在者僧分上舉趙州訪茱萸才上法堂萸云看箭州亦云看箭萸云過州云中雪竇云二俱作家蓋是茱萸趙州二俱不作家箭鋒不相拄直饒齊發齊中也只是箇射垛漢師云擊石火閃電光搆得搆不得未免喪身失命雪竇只眨得眼要識茱萸趙州麼慣從五鳳樓前過手握金鞭賀太平舉臨濟與普化去施主家齋濟問毛吞巨海芥納須彌為復是神通妙用為復是法爾如然化踢倒飯牀濟云太粗生化云者裏是什所在説粗説細濟休去至來日又同赴一施主齋濟復問今日供養何似昨日化又踢倒飯牀濟云大粗生化云佛法説什麼粗細濟吐舌雪竇云兩個老賊喫飯也不了好與二十棒棒雖行且道那箇是正賊師云普化用劒刃上事臨濟只吐得舌雪竇二十棒是賞是罰舉三角示衆云若論此事眨上眉毛早是蹉過麻谷出云蹉過即不問如何是此事角云蹉過谷便掀倒禪牀三角便打雪竇云兩箇有頭無尾漢眉毛未曾眨上説什麼此事蹉過有僧問眉毛為什麼不眨上雪竇便打師云三角一渧之水漲起際天之濤瀾麻谷撥欲一口吸乾不知浸爛鼻孔雪竇不惜眉毛要明此事腳跟下浮逼逼地舉睦州喚僧大德僧回首州云擔板漢雪竇云睦州只具一隻眼何故者僧喚既回頭因甚却成擔板師云者一片板睦州擔一邊雪竇擔一邊總不干者僧事舉巖頭參德山才跨門便問是凡是聖德山便喝巖頭便禮拜洞山聞舉云若不是奯公大難承當巖頭云洞山老漢不識好惡我當時一手擡一手搦雪竇云然則德山門下草偃風行要且不能塞斷人口當時才禮拜劈脊便打非唯勦絶洞山亦乃把定奯老還會麼李將軍有嘉聲在不得封侯也是間師云玉本無瑕雕文喪德舉巴陵示衆云祖師道不是風動不是幡動既不是幡風向什麼處著有人與祖師作主出來與巴陵相見雪竇云雪竇道風動幡動既是風幡向甚處著有人與巴陵作主亦出來與雪竇相見師云一對無孔鐵槌舉則川與龐居士摘茶次士云法界不容身師還見我麼川云若不是老師洎與龐公答話士云有問有答蓋是尋常川不管士云適來莫怪相借問麼川亦不管士喝云者無禮儀漢待我一一舉似明眼人去在川拈茶籃便歸雪竇云則川只解把定封疆不能同生同死當時好與捋下幞頭誰敢喚作龐居士師云龐公得路便行貪程太速則川一言既出駟馬難追當時待他道待我一一舉似明眼人去在只消道來日不得普請非惟坐斷龐公亦免雪竇生風起草舉僧問雲門一言道盡時如何門云裂破雪竇彈指三下師云好對春風唱鷓鴣舉僧問睦州一言道盡時如何州云老僧在爾鉢囊裏雪竇呵呵大笑師云牛頭南馬頭北舉本生和尚以拄杖示衆云我若拈起爾便向未拈起時作道理我若不拈起爾便向拈起時作主宰且道老僧為人在甚處時有僧出云不敢妄生節目生云也知闍梨不分外僧云低低處平之有餘高高處觀之不足生云節目上更生節目僧無語生云掩鼻偷香空招罪犯雪竇云者僧也善能切磋爭奈弓折箭盡然雖如此且本生是作家宗師拈起也天回地轉應須拱手歸降放下也莫偃風行必合全身遠害還見本生為人處也無復拈拄杖云太平本是將軍致不許將軍見太平師云本生有擒有縱有放有收者僧擬透龍門重遭點額作麼生是弓折箭盡處月似彎弓少雨多風舉僧問雪峯聲聞人見性如夜見月菩薩人見性如晝見日未審和尚見性如何峯打三下其僧復問巖頭巖頭打三掌雪竇云應病設藥且與三下若據令而行合打多少師云夜見月是聲聞見處晝見日是菩薩見處雪峯打三下是雪峯見處巖頭打三掌是巖頭見處者僧為什麼不會雪竇據令而行也是弄泥團漢舉太原孚上座參雪峯至法堂上顧視雪峯便下看知事雪竇云一千五百人作家宗師被孚老一覷便高竪降旗孚至來日入方丈云昨日觸忤和尚峯云知是般事便休雪竇云果然僧問雲門作麼生是觸忤處門便打雪竇云打得百千萬箇有什麼用處直須盡大地人喫棒方可扶竪雪峯且道太原孚具什麼眼師云太原孚如龍得水老雪峯似虎靠山雲門截鐵斬釘雪竇拖泥帶水山僧要問雪竇作麼生是雪峯高竪降旗處平蕪盡處是青山行人更在青山外舉安國問僧得之於心伊蘭作旃檀之樹失之於旨甘露乃蒺䔧之園我要箇語具得失兩意僧竪起拳云不可喚作拳頭國云只為喚作拳頭雪竇云無繩自縛漢拳頭也不識師云安國膠柱調紘雪竇敲空取響直饒得失兩全也是小兒伎倆頌古舉梁武帝問達磨大師如何是聖諦第一義達磨云廓然無聖帝云對朕者誰達磨云不識帝不契遂渡江至魏頌曰廓然無聖應病與藥再言不識盡情拈却提起白玉槌却是黃金鑿十萬里西來箇是當頭著却留隻履不將歸至今挂在龍牀角舉趙州示衆云至道無難唯嫌揀擇才有語言是揀擇是明白老僧不在明白裏是汝還護惜也無時有僧問云既不在明白裏護惜箇什麼州云我亦不知僧云和尚既不知為什麼道不在明白裏州云問事即得禮拜了退頌曰至道無難鐵壁銀山未明三祖意難透趙州關揀擇明白中誰知黑似漆却道我不知重言不當吃舉馬大師不安院主問和尚近日尊候如何大師云日面佛月面佛頌曰日面佛月面佛無位真人赤骨律嘉州大像喫鹽多陝府鐵牛添得渴阿剌剌百川倒流閙聒聒舉德山到溈山挾復子於法堂上從西過東邊從東過西邊顧視云無無便出德山至門首却云也不得草草便具威儀再入相見溈山坐次德山提起坐具云和尚溈山擬取拂子德山便喝拂袖而出德山背却法堂著草鞋便行溈山至晚問首座適來新到在什麼處首座云當時背却法堂著草鞋出去也溈山云此子已後向孤峯頂上盤結草菴呵佛罵祖去在頌曰德嶠馬前求廝撲溈山賊過後張弓孤峯頂上相逢著兩箇無毛老大蟲舉雪峯示衆云盡大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看頌曰大地撮來如粟粒雪峯老漢枉勞神何如輥出三毬去接取釣魚船上人舉雲門大師垂語云十五日已前不問汝十五日已後道將一句來自代云日日是好日頌曰日日是好日全身在帝鄉花衢并柳陌遊子踏青忙放牛桃林之野歸馬華山之陽不知何處是封疆舉僧問法眼慧超咨和尚如何是佛法眼云汝是慧超頌曰清溪直截指根源潮打空城浪拍天大小慧超猶寐語却言我是酒中仙舉翠巖夏末示衆云一夏已來為兄弟説話看翠巖眉毛在麼保福云作賊人心虗長慶云生也雲門云關頌云翠巖長慶雲門保福舟中之人自為敵國眉毛落盡又重生鼻孔眼睛俱失却舉僧問趙州如何是趙州州云東門南門西門北門頌曰東門南門西門北門東風得意馬蹄疾一日看盡長安春舉睦州問僧近離什麼處僧便喝州云老僧被汝一喝僧又喝州云三喝四喝後作麼生僧無語州便打云這掠虗漢頌曰金剛寶劒鋒鋩鈍踞地狻猊也只寧不是將軍誇好手幾乎打破睦州城舉黃蘗和尚示衆云汝等諸人盡是噇酒糟漢與麼行腳何處有今日還知大唐國裏無禪師麼時有僧出云只如諸方匡徒領衆又作麼生蘗云不道無禪只是無師頌曰大唐國裏無禪師噇酒糟漢河沙數十二峯前老古錐參天荊棘無行路咄舉僧問洞山如何是佛山云麻三斤頌曰當頭一句沒商量有藝從來壓當行拈出雲門乾屎橛半斤八兩恰相當舉僧問巴陵如何是提婆宗巴陵云銀碗裏盛雪頌曰銀碗裏盛雪宗師見不差西天多此種東土數如麻擒虎兕辨龍蛇眼裏何曾著得沙舉僧問雲門如何是一代時教門云對一説頌曰對一説沒誵訛寒山逢拾得撫掌笑呵呵却笑長汀憨布袋到頭不識蔣摩訶舉僧問雲門不是目前機亦非目前事時如何雲門云倒一説頌曰倒一説太分明達者須知暗裏驚黑白未分前一著五湖風月有誰爭舉僧問鏡清學人啐請師清云還得活也無僧云若不活遭人怪笑清云也是草裏漢頌曰棒喝交馳猶是鈍當機啐亦奚為曾為浪子偏憐客自愛貪杯惜醉兒舉僧問香林如何是祖師西來意林云坐久成勞頌曰坐久成勞趣味長藥因經驗始傳方分明指出西來意不比諸方孟八郎舉肅宗帝問忠國師百年後所須何物國師云與老僧作箇無縫塔帝曰請師塔樣國師良久云會麼帝曰不會國師云吾有付法弟子耽源却諳此事請詔問之國師遷化後肅宗帝詔耽源問此事如何源云湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識頌曰團團無縫本天真突出當陽見未親除却耽源有誰會大唐天子只三人舉俱胝和尚凡有所問只竪一指頌曰俱胝一指頭上下皆周匝把住與放行十方風颯颯藥因救病出金瓶劒為不平離寶匣舉龍牙問翠微如何是祖師西來意微云與我過禪板來牙取禪板與翠微微接得便打牙云打即任打要且無祖師意又問臨濟如何是祖師西來意濟云與我過蒲團來牙取蒲團與臨濟濟接得便打牙云打即任打要且無祖師意頌曰仁者見之謂之仁智者見之謂之智百尺竿頭坐底人鳳棲不在梧桐樹舉僧問智門蓮花未出水時如何智門云蓮花僧云出水後如何智門云荷葉頌曰出水何如未出時宗師直截為提持幾多拾翠尋芳者問著依然總不知舉雪峰示衆云南山有一條鱉鼻蛇汝等諸人切須好看長慶出云今日堂中大有人喪身失命僧舉似玄沙沙云須是稜兄始得然雖如此我即不與麼僧云和尚作麼生沙云用南山作麼雲門以拄杖攛向雪峰面前作怕勢頌曰南山鱉鼻蛇多年死葛怛諸子竟出來弄得活鱍鱍一人擊其頭十方世界風颼颼一人擊其尾等間平地風濤起一人擊其中風從虎兮雲從龍至今象骨峯前路寄語行人須照顧咦舉保福長慶遊山次福以手指云只者裏便是妙峯頂慶云是即是可惜許後舉似鏡清清云若不是孫公便見髑髏遍野頌曰妙峯孤頂行人少兩兩三三同入草無端踢出百花毬驚得髑髏師子吼舉劉鐵磨到溈山山云老牸牛汝來也磨云來日臺山大會齋和尚還去麼山放身臥磨便出去頌曰牸牛雖老未摧頽朝往臺山暮即回我困欲眠卿且去明朝有意赴齋來舉蓮花峯菴主拈拄杖示衆云古人到者裏為什麼不肯住衆無語自云為他途路不得力復云畢竟如何又自云楖𣗖橫擔不顧人却入千峰萬峰去頌曰宏機突出振綱宗楖栗橫擔入亂峯石裂崖崩路頭絶蓮花十丈照天紅舉僧問百丈如何是奇特事丈云獨坐大雄峯僧禮拜丈便打頌曰扁舟泛五湖鐵網拂珊瑚不入驚人浪難逢稱意魚舉僧問雲門樹凋葉落時如何門云體露金風頌曰樹凋葉落體露金風鶴歸華表鴈過長空回首妙高何處是巍巍屹立白雲中舉南泉參百丈涅槃和尚丈問從上諸聖還有不為人説底法麼泉云有丈云作麼生是不為人説底法泉云不是心不是佛不是物丈云説了也泉云某甲只與麼和尚作麼生丈云我又不是善知識爭知有説不説泉云某甲不會丈云我太煞為汝説也頌曰為人不説説不為人南泉少喜百丈多嗔箇箇皮下有血阿誰眼裏無筋王老師太惺惺掣斷金鎖天麒麟舉僧問大隨劫火洞然大千俱壞未審者箇壞不壞隨云壞僧云與麼則隨他去也隨云隨他頌曰大千一火洞然空突出無牙老大蟲剔起衲僧三角眼重來無處覓行蹤舉僧問趙州承聞和尚親見南泉是否州云鎮州出大蘿蔔頭頌曰鎮州蘿蔔無根無蒂塞斷咽喉何處出氣趙州親見老南泉釋迦不受然燈記舉麻谷持錫到章敬繞繩牀三匝振錫一下卓然而立章敬云是是麻谷又到南泉繞繩牀三匝振錫一下卓然而立泉云不是不是谷云章敬道是和尚為什麼道不是泉云章敬即是是汝不是此是風力所轉終成敗壞頌曰是是不是不是兩處親曾著賊來思量冷地空氣笑倒東村李大哥翻身便解瞞良遂舉定上座問臨濟如何是佛法大意濟下繩牀擒住與一掌便托開定佇立傍僧云定上座何不禮拜定方禮忽然大悟頌曰黃蘗堂前遭痛棒却來屋裏販揚州纍他多少旁觀者覷著通身冷汗流定上座太風流但得五湖明月在不愁無處下金鈎舉陳操尚書看資福福見來便畫一圓相陳操云弟子恁麼來早是不著便更畫圓相資福便掩却門頌曰賊來須打客來看何用重重緊著關不是機先能辨的主賓雖好不相安舉仰山問僧近離甚處僧云廬山仰山云曾到五老峯麼僧云不曾到仰山云闍黎不曾遊山雲門云此語皆為慈悲之故有落草之談頌曰不到廬山不是僧元來五老不曾登仰山蓋為慈悲故帶纍韶陽草裏行舉文殊問無著近離甚處著云南方殊云南方佛法如何住持著云末法比丘少奉戒律殊云多少衆著云或三百或五百著問此間如何住持殊云凡聖同居龍蛇混雜著云多少衆殊云前三三後三三頌曰前三三與後三三數目分明不用參回首夕陽歸路遠擘開千嶂出煙嵐舉長沙一日遊山歸至門首首座問和尚什麼處去來沙云遊山來座云到什麼處來沙云始隨芳草去又逐落花回座云大似春意沙云也勝秋露渧芙蕖頌曰狹路相逢著家風盡展開始隨芳草去又逐落花回首座增光彩長沙興未灰芙蕖滴秋露衲子莫相猜舉盤山垂語云三界無法何處求心頌曰三界無法何處求心俗人沽三升酒此地無二兩金少林冷坐成何事山未為高海未深舉風穴在郢州衙內上堂云祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是時有盧陂長老出問某甲有鐵牛之機請師不搭印風穴云慣釣鯨鯢澄巨浸却嗟蛙步𩥇泥沙陂佇思穴喝云長老何不進語陂擬議穴打一拂子云還記得話頭麼試舉看盧陂擬開口穴又打一拂子牧主云將知佛法與王法一般穴云見箇什麼牧主云當斷不斷返招其亂穴便下座頌曰從來好語不消多獨許盧陂是作家慣釣鯨鯢澄巨浸却嗟蛙步𩥇泥沙擒虎兕辨龍蛇誰在畫樓沽酒處相邀來喫趙州茶舉僧問雲門如何是清淨法身門云花藥欄僧云便與麼去時如何門云金毛獅子頌曰花藥欄金獅子雲從龍風從虎雪老輥毬禾山打鼓甜者甜兮苦者苦舉陸亘大夫與南泉語話次夫云肇法師道天地同根萬物一體也甚奇怪南泉指庭前花召大夫云時人見此一株花如夢相似頌曰天地同根萬物一體癩馬繫枯樁黑牛臥死水王老師太多觜與渠拈却眼中花無限風流出當家舉趙州問投子大死底人却活時如何投子云不許夜行投明須到頌曰大死却活是精識精投明須到不許夜行不是與人難共住大都緇素要分明舉龐居士辭藥山山命十人禪客相送至門首士指空中雪云好雪片片不落別處時有全禪客云落在什麼處士打一掌全云居士也不得草草士云汝恁麼稱禪客閻老子未放汝在全云居士作麼生又打一掌云眼見如盲口説如啞頌曰送別連將兩掌施得便宜是落便宜朔風吹雪漫空白冷暖龐公只自知舉僧問洞山和尚寒暑到來如何回避山云何不向無寒暑處僧云如何是無寒暑處山云寒時寒殺闍黎熱時熱殺闍黎頌曰寒時寒殺熱時熱殺洞山老人以鹽止渴舉禾山垂語云習學謂之聞絶學謂之鄰過此二者是為真過僧出問如何是真過山云解打鼓問如何是真諦山云解打鼓問即心即佛即不問如何是非心非佛山云解打鼓問向上人來如何接山云解打鼓頌曰堪笑禾山老從來愛撒沙只言解打鼓不會弄琵琶直下蒼龍窟還經蠱毒家祕魔巖上叟隨例也擎杈舉僧問趙州萬法歸一一歸何處州云我在青州作一領布衫重七斤頌曰青州布衫重七斤何似鎮州大蘿蔔七百甲子老禪和斷絃誰把鸞膠續舉鏡清問僧門外什麼聲僧云雨渧聲清云衆生顛倒迷己逐物僧云和尚作麼生清云洎不迷己僧云洎不迷己意旨如何清云出身猶可易脫體道應難頌曰丫鬟女子語如癡終日無心理織機化作山頭望夫石不知郎去幾時歸舉僧問雲門如何是法身門云六不收頌曰白雲出沒太虗中一片西兮一片東昨夜擡頭看北斗扶桑那畔日輪紅舉王太傅入招慶煎茶時朗上座與明招把銚朗翻却茶銚太傅見問上座茶爐下是什麼朗云捧爐神太傅云既是捧爐神為什麼翻作茶朗云仕官千日失在一朝太傅拂袖便去明招云朗上座喫却招慶飯了却江外打野榸朗云上座作麼生招云非人得其便頌曰舉不顧即差互打翻茶銚捧爐神拂袖便行王太傅獨眼龍朗上座陽春白雪無人和終日茫茫打野榸笑殺嵩山破竈墯舉三聖問雪峰透網金鱗未審以何為食峯云待汝出網來向汝道聖云一千五百人善知識話頭也不識峯云老僧住持事煩頌曰雪老太風流峯頭駕鐵舟古帆曾未挂重整釣鰲鈎橫海鯨方至攔江網已收有時乘好月特地過滄洲舉僧問雲門如何是塵塵三昧門云鉢裏飯桶裏水頌曰裏飯桶裏水渴飲飢餐東倒西起行腳師僧幾箇知靈蹤不在猿啼處告香普説編鐘樓上念贊牀腳下種菜荊棘林中是什麼人行履兩箇泥牛鬪入海無位真人因甚額頭汗出達磨不來東土二祖不往西天祖師鼻孔長多少山僧適來垂此三轉語若不是堂中第一座具人天眼目出來證明未免一場懡㦬須知衲僧頂𩕳上一著子如十日並照輝天鑑地耀古騰今何曾有一絲毫許障礙得他所以大覺世尊初生下來便道天上天下唯吾獨尊已是明明白白地説向諸人了也一大藏教一千七百陳爛葛藤總是為蛇畫足後代兒孫承虗接響不能一刀截斷致使三百五百閙浩浩地者邊商量那邊卜度莫不隨他腳跟後轉若是英靈上士如金翅擘海直取龍吞千人萬人羅籠不住做箇滅胡種草豈不快哉何用山僧向曲彔牀上搖唇鼓舌説黃道黑成得什麼事今時兄弟出來多是覓佛覓法覓禪覓道覓菩提涅槃真如解脫不肯退步向衣單下默默體究何不放教身心蕩蕩地間間地胸中不留一箇元字腳久久自然相應若是人我山高是非鋒起為五欲八風之所搖撼求其到大安樂大休歇之地不亦難乎設有一箇半箇向髑髏前認得箇昭昭靈靈底便道獼猴佩一面古鏡狸奴有萬里神光有底逴得古人些子殘光剩影便道不離當處常湛然覓即知君不可見似則也似是則未是有底但於理性上明將來聲色中透出去謂之綿綿密密不漏絲毫純是真空更無別法如斯見解未出常情勘證將來白雲萬里所以道向上一路千聖不傳學者勞形如猿捉影只如靈山會上世尊拈一枝花是時百萬之衆智如鶖子辨若滿慈尚乃茫然不知落處直饒金色頭陀破顏微笑也未夢見教外別傳底意旨在缺齒老胡十萬里得得西來面壁九年二祖禮三拜起來依位而立喚作汝得吾髓且莫誑呼別人好自餘德山臨濟趙州雲門天下老和尚用盡自己查梸總是平地生堆無風起浪點撿將來各人腳跟下好與爛椎一頓免見教壞人家男女兄弟若非真正要了辦生死大事𢬵得十年二十年工夫全身放下靠一本色宗匠與之決擇如金在礦中入其爐韛受其鉗鎚千鍛萬煉去其礦穢則金之本體自然現前又如清淨摩尼寶珠處塵勞中忽遇智人指出去其塵垢則珠之本體光明頓然發現而此金珠乃是當人本有之體非假外求但經敏手煅煉磨瑩出來則其本地風光何曾欠少不見靈雲和尚三十年做工夫一日見桃花豁然契悟乃有頌云三十年來尋劒客幾回葉落又抽枝自從一見桃花後直至于今更不疑且道不疑箇什麼舉似溈山懶安和尚溈山云從緣入者永無退失冬瓜印子又舉似玄沙沙云諦當甚諦當敢保老兄未徹在一手不獨拍兩手鳴摑摑東山五祖云説甚未徹更參三十年始得利動君子雪竇頌云本無迷悟數如麻獨許靈雲是作家借問遍參諸祖客不知何處見桃花金屑雖貴落眼成翳山僧亦曾有一頌桃花開日好風光引得遊人煞著忙劒客不知何處去令人長憶謝三郎靈雲住後長生問云混沌未分時如何雲云露柱懷胎生云分後如何雲云如片雲點太清生云未審太清還受點也無雲不對生云恁麼則含生不來也雲亦不對生云直得純清絶點時如何雲云猶是真常流注生云如何是真常流注雲云似鏡常明生云向上還有事也無雲云有生云如何是向上事雲云打破鏡來與汝相見還識靈雲麼金鏃慣調曾百戰鐵鞭多力恨無讐又有香嚴和尚在溈山會下一日溈山問云聞子在百丈先師處問一答十問十答百只今向父母未生已前道將一句來香嚴茫然無對將平生所閲底文字撿尋並無一言可以酬對遂歎云畫餅不可充飢屢請溈山為説破溈山云我若向汝説他日眼開罵我去在香嚴云此生不學佛法也且作個長行粥飯僧看他大力量人只者一個全身放下千佛出世也不奈何于今要討一箇長行粥飯僧也無討處直抵南陽卓菴一日芟除草木瓦礫擊竹作聲廓然大悟畢竟悟箇什麼且道與靈雲見桃花相去多少一對無孔鐵槌遽歸沐浴焚香遙拜溈山曰和尚大悲恩逾父母當時若為我説破豈有今日事耶者漢和骨頭一時換了仍述一偈云一擊忘所知更不假修持動容揚古路不墯峭然機處處無蹤迹聲色外威儀諸方達道者咸言上上機將謂有多少奇特徑歸溈山具陳所解溈山云今日方知吾不汝欺也何不與本分草料一日仰山問云聞師弟有悟道頌試舉看香嚴遂舉前偈仰山云此是間時搆置底未為極則太煞減人威光香嚴再舉一偈云去年貧未是貧今年貧始是貧去年貧有卓錐之地今年貧錐也無不因夜來鴈爭見海門秋仰山云如來禪許你會祖師禪未夢見在鐵蒺藜槌轉弄轉危香嚴又呈一偈吾有一機瞬目視伊若也不會別喚沙彌白雪陽春不同調仰山云且喜師弟會祖師禪孟八郎漢又恁麼去香嚴住後示衆云如人在千尺懸崖口㗸樹枝手無所扳腳無所踏樹下有人問西來意不答則違他所問若答他則喪身失命當恁麼時如何即是香嚴旁若無人發此一問不妨奇特時有虎頭上座云上樹即不問未上樹請和尚道也好一拶香嚴呵呵大笑若人知得此笑笑須三十年雪竇拈云樹上道即易樹下道即難老僧上樹也置將一問來懸羊頭賣狗肉殊不知香嚴坐籌帷幄之中決勝千里之外虎頭上坐也賞他大膽向飢鷹爪下分餐猛虎口中奪肉若不是作家宗匠洎被打破蔡州還識香嚴麼三千劒客今何在獨許莊周致太平你兄弟家出一藂林入一保社撥草瞻風尋師訪道還曾如靈雲真到不疑之地一回麼還如香嚴一擊忘所知麼有底道聲色頭上坐聲色頭上臥有底道聲不是聲色不是色有底道聞聲悟道見色明心有底道青青翠竹總是真如爛爛桃花無非般若如斯理論閻羅老子未放你過在巖頭和尚云若欲播揚大教一一從自己𮌎中流出將來與我蓋天蓋地去始得山僧濫尸此席無補宗門現前一衆總是碩德耆年諸方龍象挽回上古風規舉行藂林盛典非圖後來有所聞見亦使法道不致寂寥諸人既具鐵眼銅睛山僧安敢妄通消息適來所舉數則因緣總是古人煎過藥查嚼了殘飯有什麼滋味可以咂啖雖然忽於無滋味中蹉口咽却舌頭也難得山僧更與汝舉箇古話僧問馬大師云和尚為什麼道即心即佛大師云只為止兒啼僧云啼止後如何大師云非心非佛僧云除此外如何指示大師云不是心不是佛不是物今時兄弟才見舉箇即心即佛便把作尋常説話才舉個麻三斤乾屎橛杖林山下竹筋鞭以至釣絲絞水鋸解稱鎚新婦騎驢阿家牽三腳驢子弄蹄行如此之類便作玄妙奇特商量若作玄妙奇特商量入地獄如箭射若作平常説話入地獄如箭射佛鑑勤和尚頌云美如西子離金閣嬌似楊妃倚玉樓猶把琵琶半遮面不令人見轉風流者箇頌子作平常説話得麼作玄妙奇特商量得麼又北山隆和尚頌云即心即佛有水有竹屋便好非心非佛不襪不冠身自由不是心不是佛不是物間倚闌干立清曉紅芭蕉引碧牽牛者箇頌子作平常説話得麼作玄妙奇特商量得麼又霍山昭和尚云即心即佛嘉眉果閬懷裏有狀非心非佛筠袁虔吉頭上插筆不是心不是佛不是物漳泉福建頭匾似扇只可聞名不可見面這箇頌子作平常説話得麼作玄妙奇特商量得麼具眼禪流試定當看諸人二六時中忽然一拳打破虗空方知三世諸佛寐語六代祖師寐語天下老和尚寐語何山寐語久立衆慈伏惟珍重中夏普説古人道我若真正舉揚直須法堂前草深一丈始得誠哉是言豈不見魯祖凡見僧來便面壁南泉聞云我尋常向師僧道向佛未出世時會取尚不得一箇半箇他與麼驢年去看他古人恁麼説話蓋是奈何不得諸人既是按下雲頭山僧與你通一線路諸兄弟我不敢輕於汝等汝等皆當作佛我不敢輕於汝等汝等皆當作祖祖佛與上座不別為什麼不別只是見處不別你擬心作佛作祖喚作望上心不息正是生死根本出家行腳本為出離生死生死作麼生離才入門來便道生死事大無常迅速是你擬欲脫他生死日中還逃得影麼二乘猒生死如桎梏菩薩於生死而不捨永嘉初見曹溪道箇生死事大無常迅速六祖云何不體取無生了無速乎永嘉云體即無生了本無速六祖云子甚得無生之意永嘉云無生豈有意耶六祖云無意誰當分別永嘉云分別亦非意看他師資緣會針芥相投正去偏來明投暗合著著有出身之路此是天下第一箇行腳見人底標準如今兄弟也依樣道箇生死事大無常迅速及乎問他喚什麼作生死喚什麼作無常便即懡㦬既不能如金翅擘海香象渡河直須晝三夜三密密體究𢬵取一生兩生以至多生全體放下如癡如兀忽然洗面摸著鼻孔不為難事你若一暴十寒者邊遊州獵縣那邊玩水觀山愛名被名縛愛利被利縛愛佛法被佛法縛愛善知識被善知識縛愛超佛越祖被超佛越祖縛你若總不愛被總不愛縛初機兄弟又不可無明師善友相與䇿發至于大達之地如雪峯三登投子九上洞山後於澧州鰲山店上打破漆桶皆巖頭䇿發之功也雪峯與巖頭同到鰲山阻雪巖頭只是打睡雪峯一向坐禪一日喚巖頭云師兄師兄且起來巖頭喝云噇眠去每日牀上坐恰如七村裏土地他時異日魔魅人家男女去在峯點𮌎云某甲者裏實未穩在不敢自謾巖頭云我將謂你他後向孤峯頂上盤結草菴播揚大教猶作箇語話峯云某甲實未穩在巖頭云若實如此據你見處一一通來是則與你證明非則與你剗却峯云某甲初到鹽官聞舉色空義得箇入處頭云此去三十年切忌舉著峯云因看洞山過水頌有箇省處頭云若恁麼自救也不了峯云後因問德山從上宗乘中事學人還有分也無山打一棒云道什麼我當下如桶底脫相似巖頭震威一喝云豈不聞道從門入者不是家珍雪峯是箇沒量大人他從前許多所得不自珍惜堅謂未穩誠知佛法不是小事及乎被巖頭揣盡家私拶向萬仞崖頭伎倆已盡途路已窮時節已至曠劫未明之事將及現前却問他後如何巖頭向者裏放開啐同時眼施出啐同時用輕輕與他一推向道他後若欲播揚大教須一一從自己胸襟流出將來與我蓋天蓋地去雪峯不覺全身落在萬仞崖下一點氣息也無却蘇醒起來跳下禪牀云師兄今日始是鰲山成道今日始是鰲山成道巖頭若向者裏更與本分草料雪峯光明盛大豈止於此佛眼和尚頌云鰲山成道足人傳莫是從來話未圓賴有玄沙知始末遍身紅爛在魚船若明得者一頌便識得巖頭雪峯舌頭落處還丹一粒點鐵成金至理一言轉凡成聖此是天下第二箇行腳親近師友底標準雪峯住後示衆云南山有一條鱉鼻蛇汝等諸人切須好看又云盡大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看又云盡大地是箇解脫門把手拽不入且道者些消息從甚處得來要且不從三登九到處得來不從德山棒下得來不從巖頭道一一從自己胸襟流出蓋天蓋地處得來久參宿衲未舉先知後學初機卒難洞曉灼然此一段奇特大事無非無量劫來熏習般若種子純熟豈可造次便欲到他古人田地大覺世尊於三大阿僧祇劫修行然後萬德功圓方成正覺的非容易又不可見與麼道便乃自生退怯汝若具大信根有大力量發大志願於一念頃頓入不思議無功用廣大法門如蛟龍得一渧之水便能興雲布雨浹洽大地枯稿此是決定底事誠不虗也參玄上士行腳高流既來妙峯山中度夏不可道學禪學道妙峯無禪道可學不可道問古問今妙峯無今古可問不可將古人言句記持以當本參他古人殘涎剩唾汝心田臘月三十日總不得力設有平生參得學得講明得悟得總是癡狂外邊走自己分上有何干涉衆中有久參兄弟聞山僧與麼説話出來掀倒禪牀喝散大衆豈不有些衲僧氣息既無其人山僧再舉一則古話首山和尚一日侍風穴和尚次風穴垂淚云不幸臨濟之道至吾將墜於地首山云覩此一衆豈無人耶風穴云聰敏者多見性者少首山云如某者如何風穴云吾雖望子之久又恐耽著法華不能放捨首山云此亦可事願聞其要於是風穴上堂舉世尊以青蓮目顧視迦葉正當與麼時且道説箇什麼若道不説而説又是埋沒先聖且道説箇什麼首山便下去侍者云念法華何不祗對和尚風穴云他會也次日首山與真園頭上來穴問云作麼生是世尊不説説真云鵓鳩樹頭啼意在麻畬裏穴云你作許多癡福作麼何不體究言句穴却問首山你作麼生首山云動容揚古路不墯悄然機穴顧真園頭云你何不看念法華下語大衆風穴老人垂手處直向靈山會上與釋迦老子把手共行若非首山直下承當佛法豈到今日在今臨濟兒孫遍滿天下滅臨濟宗者果何人耶是事且止只如長夏已過太半狗子無佛性話還透得也未若也未明且莫虗過時光急著精彩始得五祖和尚道老僧尋常只舉箇無字便休若透得者無字天下人不奈你何五祖又有頌云趙州露刃劍寒霜光焰焰更擬問如何分身作兩段密菴老祖頌云狗子無佛性殺人便償命苦痛百千般因邪却打正又古德頌云狗子佛性無虎在三叉口跳上驀腰騎不用東西走若向五祖言下悟去堪與佛祖為師若向密菴言下悟去堪與人天為師若向古德言下悟去堪與學者為師諸人若透得者一箇無字趙州老漢倒退三千狗子還有佛性也無但恁麼參時熱珍重朝廷金山寺建水陸會普説僧問堯仁蕩蕩如天闊舜德淵淵似海深法施門開無壅塞三途八難盡超升朝宰臨筵請師説法師云天無私蓋地無私載進云梁武製文於曩日我皇今日再敷揚師云聖人無兩心進云昨日金鐙明碧落今朝法鼓震玄音師云見聞明歷歷我法妙難思進云與麼則皇道與佛道並行也師云知恩方解報恩師乃云如來往昔為衆生修治法海無邊行有如沛澤清炎暑普滌衆生煩惱熱所以乘大悲願力示現世間為三界大師四生慈父如優曇華時一現爾或於一毫端現寶王剎坐微塵裏轉大法輪或為轉輪聖王王四天下千子圍繞七寶莊嚴壽八萬歲飛行自在所向無礙其國豐樂人民熾盛威德特尊無有為比是皆大悲願力中之所發現所以道大悲願力猶如大海甚深無底大悲願力如太虗空廣大無際大悲願力如大日輪升于虗空大悲願力如須彌山普雨衆寶大悲願力如如意珠滿衆生願大悲願力如世明鐙普照一切大悲願力猶如高蓋普蔭群生我佛如來以大悲心而為體因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺譬如曠野之中有大樹王根若得水枝葉花果悉皆繁茂菩提樹王亦復如是一切衆生而為樹根諸佛菩薩而為花果若諸菩薩以大悲水饒益衆生則能成就諸佛智慧花果若諸菩薩以大悲心饒益衆生則能成就阿耨菩提是故菩提屬於衆生若無衆生一切菩薩終不能成無上正覺故我大元佛心聖主與釋迦如來轉輪聖王同一根本同一枝葉亦乘大悲願力示現世間作大國王為世界主允文允武克哲克明玉扆垂衣視四海衆生如赤子金輪統御攝十方剎土為一家具十地菩薩之身心超四輪王之壽量萬幾之暇留心佛法以正法治民故佛教倍前光明熾盛以大悲心饒益衆生開甘露門廣度群品由是於楊子江建金山萬僧之海會修水陸無礙之大齋披閲五千四十八卷之尊經講演教禪直指難思之妙法以百億日月而為燈燭使一切衆生得證光明三昧門故以百億須彌而為香饌使一切衆生悉皆飽滿得證法喜禪悅樂故以百億香水海而為醍醐酥酪使一切衆生頓息飢虗得入如來清淨法海故以百億四天下七寶而為布施使一切衆生永離貧苦皆得如意富樂故以過現未來百千萬億恆河沙微塵數諸佛菩薩而為眷屬使一切衆生得依怙善知識故以三千大千世界而為經卷使一切衆生常轉如是經故上窮有頂下極空輪若幽若顯咸脫於苦輪曰天曰人皆承其恩力莫不皆從佛心聖主清淨微妙大悲願力中之所流出上合諸佛本覺妙心下與一切衆生同一悲仰以此祝聖壽壽如妙高不動之山以此延聖福福等華藏甚深之海以此治國家則民康物阜以此平天下則海晏河清百億劫之罕逢十方國之希有何異釋迦出世彌勒降生恆河沙界盡入提封九十六種咸歸正化巍巍乎蕩蕩乎不可得而稱量不可得而思議只今君臣慶會佛法光揚知恩報恩作麼生道兩輪日月無私照一統乾坤樂太平復舉梁武帝夢神僧告曰六道四生幽囚者衆何不建水陸大齋而濟拔之帝既寤詔十大高僧披尋大藏撰成儀文始於金山建此大會於初夜分悉停燈燭帝親臨筵禱曰若此儀文理協聖凡願我拜起燈燭自明如未符聖意燭暗如故帝一拜燈燭皆明二拜宮殿震動三拜天雨寶花當時靈異不可勝數至於歷代修建顯驗猶多當今佛心天子以梁武之心為心特降御香七寶綵段修設齋供建此大會宰相百官光臨法會諸山碩德共闡玄音凡聖混融人天交接直得娑竭羅龍王從海涌出親獻寶珠天帝釋空中雨花殷勤贊嘆上來臣僧升于寶座舉唱宗乘所萃鴻因端用祝延天算復成一偈堯眉八采輝寰宇舜目重瞳照四方紫金山頭日卓午大千沙界仰恩光法語示行侍者古來本色衲子尋師訪道決擇此事須得明師善友切磋琢磨日漸月漬自然超群拔萃千人萬人羅籠不住方堪為種草雪峰三登投子九上洞山於德山棒下如桶底脫至鰲山店上跳下禪牀云今日始是鰲山成道雪峰如吞舟之魚搖乾蕩坤振𩮻擺尾若不得巖頭震燒尾之雷電而欲過禹門其可得乎師友琢磨之功信不誣矣後來建大道場一千五百龍象圍繞光明盛大若揭日月焉雲夢之竹天下之徑不矯揉羽筈則不能以入堅棠溪之金天下之利不鎔範砥礪則不能以擊強其斯之謂泉南行侍者與巖頭雪老同一生緣遍參閩浙諸大尊宿既親近明師友何患乎所得不深所見不廣欲還故里省親來求警䇿因謂之曰父母非我親誰是最親者諸佛非我道誰是最親者這裏下得轉語不妨衣錦還鄉其或尚涉途程直須如真覺祖師跳下禪牀時一回方為究竟勉之勉之示阜上人終日喫飯未嘗咬著一粒米終日著衣未嘗挂著一縷絲我與麼道早是龜毛長數丈了也你若攀緣不息妄想馳求覓佛覓法覓禪覓道大似緣木求魚刻舟求劍直須二六時中不依倚一物則自然虗而靈寂而妙喚作無依道人又謂之金剛正體又謂之頂王三昧隨處作主遇緣即宗朝往西天暮還東土有什麼過阜上人坐夏山中來求警䇿書此示之示寶維那古人三登投子九上洞山為什麼事玄沙不出嶺保壽不渡河又作麼生古今無異達者同途良驥追風何勞鞭影不見古靈和尚告其師曰靈光洞耀逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛者箇是參方歸省師資相契底千古龜鑑豈似如今隨群逐隊推磨行腳增長無明虗延歲月者又將何面目以見其師耶閩中寶維那歷遍百城一斑未露明日還鄉省師當如古靈作大獅子吼不妨暢快平生何山聞得焚香為汝證明此事終不虗也示成上人人人有箇生緣如何是上座生緣若道某甲是某州某處人氏與麼祗對錯了也你若識得生緣一生參學事畢雲門大師道生緣若在向北北有趙州和尚五臺文殊總在者裏生緣若在向南南有雪峰臥龍西院鼓山總在者裏你若會得雲門説話不必南詢諸友重見文殊樓閣門開方參彌勒
