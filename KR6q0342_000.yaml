front:
  text: 育王月江和尚語録敘余初游方時月江禪師已出世說法雖辱交三十餘年而以不及預參徒久親爐鞴為恨至治間奉旨金山升座獲聆提唱而驚其若河漢之無極也比者其徒如月以師語録示余始取讀之脫然如病之遇耆域不假湯液丸劑針砭灸尉而咳呼吸之頃已疾去而平復百骸調適而併忘其有身矣於是持神定氣𣸪㳂涯涘以深入性海其大無外其細無內內無自心外無萬境上而十地滿覺下而三界草五有皆聖凡影響化儀設施在性海中非有非無非存非亡非取非捨非來非去如虗空具含諸相如大地容載萬物無自他之間無今古之殊乃於其中縱橫游戲卷舒自在行棒行喝揚眉瞬目動靜語默嬉笑怒罵無非妙用或與而奪或縱而擒或與無町畦倐而崖絶敲空作響言於無言撥火覔漚作於無作其稱性而說也雷雨八荒其稱性而用也埏埴萬化噫何此老作大法施神通三昧有如是耶以吾淺陋觀之猶所得叵量又豈無大乘根器一聞一見而親證實悟以續慧命而傳正法眼如古塔主之讀雲門録有足徵矣至元六年庚辰歲三月龍翔住山比丘大欣拜書月江和尚語録序前雞足山師弟比丘正澄述原夫真理無當至音絶常然理無不周音無不備擴而充之必待曠世開士出焉師之語要真理至音之謂乎廓洪機之自在也若海潮之灑雪迅玄辨之自然也類天鼓之訇霆乾乾綱宗罔究終始至若空谷答響洪鐘應擊固虗通之任扣奚眹迹之能彰今茲編集非師之本意也禪徒托而成帙蓋滄溟之涓渧泰華之毫芒耳聊陳序引用識歲時至治三年癸亥孟陬日月江和尚語録目次卷上序笑隱清拙碧雲禪寺録澱山禪寺録南禪興國禪寺録澱山禪寺再住録何山宣化禪寺録道場禪寺録阿育王山廣利禪寺録卷中拈古頌古普說法語卷下佛祖讚自讚偈頌題跋跋空遠古林東嶼靈石
