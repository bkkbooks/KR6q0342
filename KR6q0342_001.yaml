body:
  text: 月江和尚初住常州路碧雲禪寺語録平江路太平禪寺住持門人居簡編師於元貞元年乙未十一月二十日受請入寺指山門云三門俱開門門可入通方上士把手同歸拈總統所疏握古刀尺秉大權衡珠回玉轉雷動風行登座拈香云此一瓣香共祝今上皇帝萬歲萬萬歲次拈香云爇向爐中供養我見住徑山興聖萬壽禪寺佛慧定智禪師虎巖大和尚用酬法乳之恩遂就座僧問云師唱誰家曲宗風嗣阿誰師云有眼無耳朵六月火邊坐進云官不容針私通車馬師云且望闍黎善傳進云三聖道我逢人則出出則不為人意旨如何師云臂長衫袖短進云興化道我逢人則不出出則便為人又作麼生師云腳瘦草鞋寬進云和尚出世為復為人不為人師云心不負人面無慚色僧禮拜師乃云諸佛出世見兔放鷹祖師西來像席打令若據衲僧門下正好一坑埋却所以印上座尋常見佛見祖如生冤家聞道聞禪如風過樹今日不著便被人推入者水牯牛羣隊裏不免拋三放兩簸土揚塵揭開千聖頂門擊碎今時窠窟拈拄杖云芭蕉和尚來也你有拄杖子與你主丈子你無主丈子奪却你主丈子卓主丈云分開華嶽連天秀放出黃河一派清復舉閩王請羅山開堂羅山才登座以手斂僧伽黎顧視大衆便下座閩王近前執羅山手云靈山一會何異今日羅山云將謂你是箇俗漢師云好諸禪德君臣道合照用同時得失兩忘是非泯絶只如羅山道將謂你是箇俗漢又作麼生棋逢敵手難藏行琴遇知音正好彈上堂黃面老漢二千年前將一條無絲線索子把盡十方世界海情與無情腳跟下一結結定喚作安居禁足法門至今未有箇剔脫得底者裏莫有天然氣槩逸格變通底衲僧麼我要問你因甚聞鍾聲披七條上堂舉浮石示衆云山僧開箇卜鋪斷人貧富生死僧便問離却貧富生死不落五行請師直指石云金木水火土拈云從上若佛若祖天下老和尚總是箇賣卜漢浮石與麼指示只是罕遇知音者僧擬透重關不覺撞頭磕額只如浮石道金木水火土作麼生會識取鈎頭意莫認定盤星上堂斬釘截鐵出眼中屑百丈耳聾黃蘗吐舌上堂舉東山空和尚示衆云千五百衆雪峯住無面軟餅褁露柱橫咬竪咬飽便休莫倚他門傍他戶山僧即不然翻著襴衫歌雪曲倒携席帽趕村齊只知隨例餐䭔子也得三文買草鞋上堂舉拂子云百千法門無量妙義總在拂子頭上還見麼擊拂子云大食國裏擊鼓鳴鐘新羅國中和南不審且道趙州和尚因甚八十行腳上堂碧雲九十日內與諸人守護心城內不放出外不放入西天此土總在者裏䗶人冰鐵彈子無位真人是什麼乾屎橛喝聖節州中滿散升座乾坤交泰日月光華和氣氤氳慶雲紛郁是故聖人乘大願輪示現受生降跡閻浮垂衣而治居九五至尊至貴統十方為瑞為祥跨千古以傳芳掩百王而騰實恩籠九域仁被八區扇盤媧太古之淳風播羲軒無私之至化所以道莫其德德音其德克明克明克類克長克君王此大國克順克比自然龍吟霧起虎嘯風從醴泉涌而嘉禾生鳳凰來而麒麟現福流恆河沙界壽等百億彌盧正與麼時畢竟如何舉唱竪拂子拈起少林無孔笛臨風吹出萬年歡上堂知見立知即無明本知見無見斯即涅槃無漏真淨云何是中更容他物拈云釋迦老子十二劑骨頭百雜碎了也渾家不管興亡事贏得和雲占洞庭上堂舉雲門云眼睫橫亘十方眉毛上透乾坤下透黃泉須彌塞却你咽喉還有人會得麼若有人會得拽取占波共新羅鬪額拈云雲門大師前頭嚇殺人後頭笑殺人若人知得笑須三十年月江和尚住松江澱山禪寺語録湖州路何山宣化禪寺住持門人妙心編師於大德七年癸卯七月十二日受行宣政院請入寺至佛殿云過去佛是現在佛弟子現在佛是誰弟子提坐具云一舉四十九拈院疏宣流善政𠃔合至公一句全提群機普應拈香祝聖罷遂就座僧問云曇花重現覺苑春回正與麼時請師祝聖師云堯仁如天進云如何是第一義師云此是第二義進云與麼則喝散大衆去也師云獅子咬人韓盧逐塊僧禮拜師乃云當陽大坐正令全提日照天臨河清海晏塵塵剎剎全彰諸佛妙門物物頭頭總是普光境界廓示人天正眼運轉根本法輪以此續佛慧命以此傳持祖燈以此毗贊國風以此助揚至化拈主丈云五鳳樓前吹玉笛萬年松下擊金鐘卓主丈一下復舉僧問投子如何是一大事因緣子云尹司空請老僧開堂師拈云釋迦老子以佛法付囑國王大臣有力檀那令法久住投子和尚剖洪音於太古霈法雨於靈區直得雲漢昭回金湯惟固今日忽有人問澱山如何是一大事因緣只對他道曹朝請請山僧開堂且道與古人是同是別拈主丈卓一下但見皇風成一片不知何處是封疆徑山佛慧先師遺書至拈香初秋七月有二日毗嵐捲空海水立吹倒凌霄第一峯直得神號并鬼泣若謂先師滅度苦屈蒼天若謂先師不滅度蒼天苦屈攔腮一掌肋下三拳于今冷地思量著悔不當初雪此冤法旨至上堂僧問西天佛子大元帝師聲震五天化敷八表正與麼時誰是知恩者師云法雷普震群龍喜慧日才開大地明進云獅子吼處兒增健法雨雱時木向榮師云日月無私進云忠國師因唐肅宗問如何是十身調御國師云檀越踏毗盧頂上行意作麼生師云瞻仰有分進云帝云此意如何國師云莫認自己清淨法身未審如何委悉師云赤心報主進云只如今晨法旨遐宣人天敬仰和尚將何報答師云雲從龍風從虎進云知恩方解報恩便禮拜師乃云大用現前大機圓應如天普蓋似地普擎似月照於千江如春行於萬國我本無心有所希求今此法王大寶自然而至直得雲行雨施雷厲風蜚揚法化而萬方寧靜震玄音而四海晏清魔外自此而潛踪人天由茲而交慶正與麼時畢竟功歸何所願同寶掌千千歲萬古長為帝者師歲旦上堂歲之元日之元萬化從元而始大地依元而住從上若佛若祖天下老和尚河傾海涌說此元字不出三千大千世界以至華藏世界海窮此元字不盡山僧只作一句道與諸人便下座元夕上堂然燈前然燈後古今無表裏虗空無背面西天阿蘭那寺燈花落地燒著帝釋眉毛是汝諸人還覺面門熱麼上堂將死就地彈底如麻似粟喝起向虗空裏打底罕逢作者山僧一條拄杖不曾輕輕拈出若非上上人來如何起動得伊須知佛法不是小事上堂舉龐居士云十方同聚會箇箇學無為此是選佛場心空及第歸拈云蝦蟇跳上梵天蚯蚓抹過東海青苗會滿散上堂國以民為本民以食為天衲僧以慧為命以禪悅為食山僧與諸人連日同遊毗盧遮那性海歷遍百一十城所參底知識所得底法門無不了知且道柔軟勝味主稼神與無量主稼神所談何法拈主丈卓一下云歸堂喫茶上堂玄沙不出嶺保壽不渡河二祖不往西天達磨不來東土如是安居如是禁足澱山門下朝打三千暮打八百上堂大凡一問一答一拶一挨也須是本色道流始堪持論你將雲門半片胡餅來我與你半箇須彌山你將趙州一盞茶來我與你一渧大海水若是眼裏著不得須彌山耳裏著不得大海水莫錯怪別人好上堂南來北來上載下載廬陵米作麼價草鞋錢教誰還不探驪頷安得驪珠不入虎穴爭得虎子拍禪牀便起上堂僧問鐘樓上念讚牀腳下種菜意旨如何師云無意旨進云風不鳴條雨不破塊好箇太平時節師云知恩者少師乃云風不鳴條雨不破塊鐘樓上念讚牀腳下種菜夜來天帝釋在中庭與德山臨濟相爭佛法引德深妙神惡發把須彌山一槌擊碎山僧夢中驚覺不覺起來撫掌呵呵大笑且道笑箇什麼佛滅二千年比丘少慚愧初祖忌拈香南天不是生緣東土亦非化境𦵇嶺迢迢絶去蹤少林寂寂無寒影且道祖師今日還來也無拈起香云五葉花敷劫外春一曲希聲與誰聽上堂洞山麻三斤趙州柏樹子蚊子上鐵牛無你下觜處衲僧家今日三明日四但知隨例餐䭔子也得三文買草鞋上堂拈主丈云主丈子二千年前靈山會上親聞如來金口叮嚀向二千年後令諸比丘據菩薩乘修寂滅行只今往三十三天以至遍歷無邊香水海復繞須彌山三匝還歸本處普為諸人說安居偈云人皆畏炎熱我愛夏日長薰風自南來殿閣生微凉卓主丈喝一喝上堂僧問如何是新年頭佛法師云大雪滿長安進云忽然日出時如何師云賺殺闍黎師乃云新元布令四序開端千山雪白萬壑雲寒大地山河齊稽首紫宸殿上曉排班上堂諸方以棒喝為佛事普光棒喝束之高閣諸方建大將旗鼓普光旗鼓置之一壁但有來者只是尋常相見自然賓主歷然會麼金輪天子勑草店家風別月江和尚住松江南禪興國禪寺語録湖州路顯慈禪寺住持門人大機編佛殿三十二相八十種好麻三斤乾屎橛殿裏底九九八十一便禮拜小參僧問法隨法行法幢隨處建立是阿誰分上事師云普進云今日得聞於未聞去也師云劄師乃云摩竭室中不通水泄毗耶城裏線路放開有時孤峯頂上嘯月眠雲有時十字街頭和泥合水所以山僧住澱山只見澱山境界湖光㶑灔樹影婆娑㵎草巖花樵歌漁唱來興國只見興國家風潮通百浦月照萬家鶴唳雲間鶯吟古木百城烟水無二文殊樓閣門開誰名彌勒擊拂子波斯鼻孔長上堂一夏九十日等間過了或以䗶人為驗或以鐵彈子為驗是猶衆盲摸象族庖解牛皆未見全象全牛底道理雪竇道全象全牛翳不殊從來作者共名模如今要見黃頭老剎剎塵塵在半塗明覺老人得一橛佛涅槃上堂提智慧刀破煩惱網拔生死類置涅槃城不無黃面老人爭奈貴價精神賤價賣開元古林和尚至上堂僧問兩鏡相照中間無像時如何師云闍黎在什麼處見進云趙州和尚到黃蘗蘗見來閉却方丈門意旨如何師云大開東閣進云趙州於法堂上叫云救火救火意作麼生師云即日共惟進云蘗開門扭住云道道又且如何師云莫怪坐來頻勸酒自從別後見君稀僧云趙州道賊過後張弓𡁠師云賓主交歡進云只如今日開元和尚相見有何言句師云大衆諦觀進云與麼則聞於未聞也師云天高地逈師乃云作家相見如擊石火似閃電光擬議不來白雲萬里今日師僧才見通箇寒暄道箇萬福把作尋常及乎指鹿為馬將日作月拋出陝府鐵牛驚倒嘉州大像便乃點頭咽唾以為奇特喝一喝明眼人前一場敗闕剃僧付衣入淨妙國土說法身佛著清淨衣入無差別國土說報身佛著無差別衣入解脫國土說化身佛著光明衣若有一人不在此衣之下者我誓不成正覺上堂舉德山一日飯遲托鉢至法堂雪峯見云者老漢鐘未鳴鼓未響托鉢向甚處去德山低頭歸方丈峯舉似巖頭頭云老漢未會末後句德山聞得喚巖頭云汝不肯老僧那巖頭密啓其意德山來日上堂與尋常不同巖頭至僧堂前撫掌云且喜老漢會末後句雖然如是只得三年三年後果化去拈云德山老漢尋常據條白棒佛祖近傍無門因甚被雪峰輕輕一拶便見腳忙手亂總道巖頭密啓其意殊不知正是掩耳偷鈴山僧道若論末後句莫道德山巖頭敢保西天四七東土二三未夢見在月江和尚再住澱山禪寺語録溫州路天寧禪寺住持門人慧忠編入寺上堂大方無外大圓無內無內無外聖凡普會竪起拂子看看恆沙國土恆沙世界百寶莊嚴只今盡向拂子頭上出現恆沙諸佛各各坐天華臺四衆圍繞來集於此吹法螺擊法鼓異口同音作獅子吼舉起也千身彌勒動用也隨處釋迦文殊放金色光明普賢現白銀世界西天四七東土二三天下老和尚各各於一毫端現寶王剎坐微塵裏轉大法輪山河大地日月星辰明暗色空一印印定山僧適自雲間佛國回至此普光王世界得與恆沙諸佛現前大衆兩得相見所謂過去諸如來斯