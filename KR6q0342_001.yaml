大地是個解脫門把手拽不入且道古人意在什麼處今時道流多是自生退屈自生難易未證謂證未得謂得聞聲被聲礙見色被色礙見空被空礙見山被山礙見水被水礙見佛被佛礙見魔被魔礙欲得獨步大方直須高超三界何謂三界貪是欲界嗔是色界癡是無色界你一念貪便被水溺你一念嗔便被火燒你一念癡便被風飄若離得者三種便是出三界外人聞聲不被聲礙見色不被色礙見空不被空礙見山不被山礙見水不被水礙見佛不被佛礙見魔不被魔礙說長期短期不被長期短期礙說安居禁足不被安居禁足礙一切處自由一切處無礙拍禪牀云如人上山各自努力解夏黃金真人鐵面具開眼覷著凜凜風生遠山作眉紅杏腮開得口來早成話墮東弗于逮打鼓南瞻部洲小參西瞿耶尼安居北單越自恣日月居忉利之上四禪無風火之災汝等諸人坐在清凉界中那裏知得江南兩浙春寒秋熱喝一喝結夏只此處便是妙峯孤頂龍蛇混雜凡聖同居南來者上間安排北來者下間安著鼻孔廝拄赤肉相挨壁立萬仞底軟似綿團和泥合水底渾鋼打就耳裏著得無邊香水海眼裏著得百億須彌盧九十日內佛眼也覷他不破只如大通智勝佛十劫坐道場因甚不得成佛道待小溪水逆流即向汝道結夏清機歷掌三十三天撲帝鐘大用現前當陽打動關南鼓衲僧家舉一步踏翻四大香水海不喚作禁足得麼動一念推倒百億須彌盧不喚作安居得麼所以道若立一塵野老顰蹙不立一塵野老謳歌百草頭上罷却干戈閙市門頭識取自己一月普現一切水一切水月一月攝成就八萬四千塵勞門彈指三生六十劫冬至三世諸佛不知有羊頭車子推明月狸奴白牯却知有沒底船兒載曉風洞明格外真規漏泄劫前消息有句無句如藤倚樹樹倒藤枯句歸何處矮師叔三千里賣却布單即不問老大溈因甚放下泥盤呵呵大笑擊拂子九九陽生第一爻冬至寒食一百五歲除云日遷月化歲去年來天寒人寒各宜保愛常啼菩薩賣却心肝教誰學般若善財童子走得腳生瘡至今無消息山前王大公一百二十歲騎一頭水牯牛從南村至北村過東村至西村報道漸漸雞皮鶴髮看看行步龍鍾惟有徑路修行但看一頭水牯水牯水牯四蹄踏土皮好鞔鼓角好吹鳴哩鳴且道是何曲調臘月二十九月江和尚住湖州道場禪寺語録門人慧觀壽椿德粹等編師於天曆二年八月十五日受請入寺指山門云此是千聖共行底門戶諸人得箇入處不得孤負山僧祖堂石從空裏立火向水中焚祖師肉猶暖在升座拈香祝聖畢就座云我本無心有所希求今此寶藏自然而至莫有窺藩而入據䁀而嘗者麼僧出問輟妙峯之祖席踞虎阜之道場如何是不動尊答云八十翁翁輥繡毬僧云今日開堂願聞祝贊答云一人有慶兆民賴之僧云如何是雲峰境答云階前合抱香入雲屋底清池照瑤席僧云如何是境中人答云鼻孔撩天不受穿僧云人境已蒙師指示向上玄關事若何答云玉本無瑕雕文喪德僧禮拜師乃云道場山頂何山麓事屬一家江月照兮松風吹面目現在五百年來據此牀座者莫不龍驤虎驟電卷星蜚總是鶻眼鷹睛銅頭鐵額及乎山僧到來已是落七落八了也喝一喝神光不昧萬古徽猷入此門來莫存知解所以道我若真正舉揚宗教正須法堂前草深一丈然事無一向理出多端且向建化門中通箇消息竪起拂子云看看瓦礫堆頭黃金滿地一莖草上玉殿崢嶸塵塵是解脫之場剎剎有通霄之路諸山宿德常為苦海津梁兩序耆年永作山門柱石重光祖道大振玄風翠竹黃華均沾至化樵歌漁唱共樂升平正與麼時畢竟功歸何所擊拂子一統乾坤新日月大千沙界舊山河復舉僧問百丈如何是奇特事丈云獨坐大雄峯僧禮拜丈便打頌云大雄峯頂坐巍巍兔角拈來好𦘕眉談笑據他獅子窟阿誰奪我鳳凰池一天明月照瑤席滿院秋風生桂枝稽首祝君無量壽大家同樂太平時當晚小參僧問靈山話月曹溪指月此意如何答云清平時節切忌訛言僧云馬大師三人玩月又作麼生答云一波才動萬波隨僧云一人道正好供養一人道正好修行一人拂袖歸衆未審孰優孰劣答云大家吹滅暗中行僧云馬大師道經歸藏禪歸海惟有普願獨超物外為復是褒是貶答云鐵蒺藜槌轉弄轉危僧禮拜師乃云百丈以前無住持事惟是穴處巖居㵎飲木食所以孤峯萬仞鳥道虗玄碧落青霄道人活計好箇太平氣象無端立規立矩分主分賓大朴既漓淳風乃散致使架大屋著間漢三百五百閙浩浩地九九百百半青半白德山臨濟逞自己之查梨雲門趙州索遼天之高價後代兒孫接響承虗喚鐘作甕要扶竪他佛祖門風直是天地懸隔何如我雲峰門下碩德耆年各出隻手擬將夜摩覩史之宮移向雪峰瑤席之上山僧乍入門來聞得者箇消息不覺手舞足蹈遂呵呵大笑云敗壞多年苕帚樁等間拈起定宗綱君臣道合風雲會不比諸方孟八郎擊拂子復舉盤山示衆云心月孤圓光吞萬象光非照境境亦非存光境俱忘復是何物拈云盤山老人向威音王已前拈出一段奇特大事直是風吹不入水灑不著山僧擬著隻眼要與盤山相見擊拂子此夜一輪滿清光何處無留兩序上堂禮非玉帛而不表樂非鐘鼓而不傳叢林股肱得人三代禮樂盡在是矣拈主丈去過去諸如來風行草偃現在諸菩薩玉振金聲未來修學人少你一分不得卓主丈一下開爐上堂南方火爐頭有則無賓主話輕如太華重若鴻毛三世諸佛說不到六代祖師提不起天下老和尚摸索不著山僧不惜眉毛為諸人說破良久云一牛飲水五馬不嘶法堂僧堂成上堂僧問古人云若據真正舉揚法堂前直須草深一丈始得此意如何師云長劍倚天寒進云寧可間却七間僧堂不怕佛法爛却又作麼生師云拋磚引玉進云且道牧石老禪一力建造法堂僧堂與古人是同是別師云不向如來行處行僧禮拜師乃云極大同小不見邊表極小同大忘絶境界山僧以十方剎土為伽藍以無邊法界為堂宇以森羅萬象為參徒以八部天龍為眷屬進一步踢著須彌燈王鼻孔退一步踏著陳如尊者脊梁直饒金牛舞飯而來趙州靠杖即出正是魯般門下弄斤斧要見斬新日月特地乾坤須是我牧石老禪始得委悉麼驚群須是英靈漢敵勝還他獅子兒請執事上堂僧問如何是理無礙法界答云頭陀石被莓苔褁僧云如何是事無礙法界答云掬水月在手弄花香滿衣僧云如何是理事無礙法界答云巢知風穴知雨僧云如何是事事無礙法界答云石從空裏立火向水中焚僧云恁麼則昔日祖師今朝和尚答云不可借他鼻孔出氣僧云謝師答話拂袖歸衆師乃云理法界事法界理事無礙法界事事無礙法界舉拂子云者箇是什麼法界若也不會更與汝指出經歸藏禪歸海是藏主法界客來須看賊來須打是知客法界栽菜根向上二年同一春是典座法界刈得三百箇祖師頭是直歲法界作麼生是長老法界碧眼胡僧笑點頭此時山僧都不會擊拂子上堂新年佛法如何指南清池瑤席覿面相參普賢高繫象王袴妙德長拖獅子衫且道無位真人還受歲也無明破則不堪上堂僧問日月居忉利之上四禪無風火之灾未審是何人境界答云胡張三黑李四僧云只如燈明如來走入露柱裏藏身和尚為什麼不知答云陳蒲鞋周金剛僧云雲門大師因甚却向山門頭合掌佛殿裏燒香答云牛頭南馬頭北僧禮拜師乃云好箇元宵節無油不點燈乾坤新雨露雲水舊師僧石虎翻身轉泥牛盡力耕太平無一事日午打三更佛涅槃上堂舉唐順宗問佛光滿禪師云佛從何方來滅向何方去既言常在世佛今在何處答云佛從無為來滅向無為去法身等虗空常在無心處帝大悅師云法身廣大等虗空生滅何須較異同夾道桃花風雨後馬蹄何處避殘紅上堂舉僧問廣德周和尚云阿逸多不斷煩惱不修禪定佛說此人成佛無疑此理如何周云鹽又盡炭又無僧云鹽盡炭無時如何周云愁人莫向愁人說說向愁人愁殺人頌云行看山兮坐看山春風花鳥自關關善財別後無人到樓閣門開盡日間法座新成上堂大衆此處即是毗盧遮那如來所處憍尸迦須彌山頂善法之堂此座即是普光明藏獅子之座此蓋即是寶積長者所獻之蓋遍覆三千大千世界其座高出八萬四千由旬其堂高一十六萬由旬一一軒窗一一欄檻一一莊嚴藏交光相羅如寶絲網如普賢毛孔如彌勒樓閣諸佛剎海一一現前無壞無雜所謂諸佛曾來入此堂是故此堂最嚴淨諸佛曾來坐此座是故此座最吉祥諸佛曾受此寶蓋是故此蓋最殊特須知此堂此座此蓋不從天降不從地涌皆從我山中牧石老禪根本智中之所流出竪窮三際則三際圓融橫亘十方則十方通暢擊拂子虗空可量風可擊無能盡說佛功德浴佛上堂僧問佛身無為不墮諸數因甚向王宮降生答云莫謗瞿曇好僧云爭奈指天指地何答云黃葉止兒啼僧云未諗諸佛出世為什麼邊事答云離婁行處浪滔天師乃云若人欲入佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙諸禪德拈起勺子便被勺子礙浴得者箇浴不得𨚗箇便被那箇礙浴得那箇浴不得者箇便被者箇礙作麼生得所向皆無礙去向悉達太子未出母胎以前道將一句來陀羅麻室利皇后賜衣上堂迦葉上行衣輪王髻中寶得來本自無心披處短長恰好且如何是報德酬恩底句昨夜日輪開桂花今朝月窟生芝草都寺辦齊上堂雲門喫胡餅咬著帝釋鼻孔雲峯喫餕餡咬著憍梵鉢提舌頭諸人二時上堂喫粥喫飯合作麼生忽然咬破一箇鐵餕餡方知帝釋鼻孔只是憍梵鉢提舌頭憍梵鉢提舌頭只是帝釋鼻孔不見道一切智智清淨無二無二分無別無斷故喝一喝上堂僧問如何是千尺舍那之身師云肥不露肉瘦不露骨進云如何是丈六紫磨金色之身師云切忌認奴作郎進云和尚且莫壓良為賤師云山僧從來柳下惠師乃云有時拈龜毛拂子作丈六金身有時將丈六金身作龜毛拂子七顛八倒簸土揚塵是你諸人還知雲峯落處麼當機覿面提覿面當機疾堪笑鬪雞人水牛也不識雪中上堂僧問達磨少林九年面壁二祖立雪齊腰必竟為什麼邊事答云罕逢穿耳客多是刻舟人進云二祖道弟子心未寧乞師安心此意如何答云閙市裏拋碌磚進云達磨道將心來與汝安又作麼生答云陸地上駕鐵船進云二祖道內外覓心了不可得磨云與汝安心竟為復是有心可安無心可安答云點鐵化為金玉易勸君除却是非難僧便禮拜師乃云白牛露地南泉無處尋蹤香象渡河普賢失其境界寒凜凜玉樓起粟白皚皚銀海生花古佛堂前燈籠起舞夜明簾外露柱交參顯揚少室宗風揭示新年佛法太陽溢目依然水緑山青大地春回直得河清海晏拍禪牀野老不知堯舜力鼕鼕打鼓樂豐年佛涅槃上堂僧問始從鹿野苑終至跋提河於是二中間未嘗談一字此理如何師云無孔鐵槌當面擲進云爭奈一大藏教何師云識取鈎頭意莫認定盤星進云白雲乍可來青嶂明月難教下碧天師云引不著師乃云釋迦老子四十九年三百餘會大似幻師幻出山河大地草木叢林城邑聚落人畜草木皆與實相不相違背末後復作幻虎還食幻師幻師既滅諸幻隨滅諸幻既滅幻滅亦滅良久拍禪牀云雙林樹下少人行多子塔前閙如市上堂舉僧問洞山如何是古佛心山云巢知風穴知雨師頌云巢知風穴知雨一句明明為君舉森羅萬象盡交參渤海新羅齊鼓舞報諸人休莽鹵古德有言兮先天為心祖結制上堂僧問有句無句如藤倚樹此意如何師云無齒大蟲當路坐進云疏山問忽若樹倒藤枯句歸何處溈山呵呵大笑又作麼生師云曹娥讀夜進云後來明招為他點破還端的也無師云臨崖看滸眼特地一場愁進云今日學人問和尚樹倒藤枯句歸何處未審和尚如何指示師喝一喝僧禮拜師乃云雪峯領衆到浮江寄夏自失一隻眼西院留天平商量兩錯不惜幾莖眉雲峰有年無德也不留人過夏商量兩錯生風起草也不領徒諸方寄夏帶水拖泥也不探龍宮踏番巨海也不入虎穴踢倒須彌只是飲水定渴喫飯療飢禪客相逢只彈指此心能有幾人知上堂玄沙和尚道者一片田地分付諸人多少時也須知者一片田地非七寶之所成就晝夜常放無量𤥖光不以日月所照為明三世諸佛踏不著六代祖師行不到明眼衲僧覷不見現前一衆二六時中行住坐臥折旋俯仰忽然蹉腳踏著打箇翻車筋斗蘇醒起來方知道元來平似鏡誰道爛如泥七月旦行道上堂僧問朝離東土暮往西天是什麼人師云十字街頭石敢當進云昨日有人從天台來因甚向南嶽去師云鮎魚上竹竿進云有一人常在途中不離家舍有一人常在家舍不離途中且道孰優孰劣師云兔馬有角牛羊無角進云恁麼則庭前一葉落天下盡知秋師云知時別宜堪作闍黎僧禮拜師乃云三十年來住子胡二時粥飯氣力麁無事下山行一轉借問時人會也無子胡大似年老心孤雲峰則不然三四年來住道場二時粥飯氣力強普請下山行一轉萬頃田疇𥝧稏香上堂僧問達磨面壁意旨如何師云餿飯泥茶爐進云六祖踏碓又作麼生師云兔子喫牛嬭進云一人道不識一人道不會意在什麼處師云鳳林吒之僧禮拜師乃云達磨不識九年面壁六祖不會長年踏碓帶纍兒孫東倒西儡新婦騎驢阿家牽張公喫酒李公醉好大哥上堂一二三四五六七地水火風空覺識一微塵內有真空三世如來從此出不是心不是佛不是物大方獨步更由誰頂門放出遼天鶻上堂僧問夜來小參和尚舉僧問投子大死底人却活時如何投子云不許夜行投明須到意旨如何師云冬至前後沙飛石走進云正堂和尚頌云我疑千年蒼玉精化為一片秋水骨海神欲護護不得一夜鰲頭忽擎出未審正堂和尚具什麼眼目師云急須著眼看仙人莫看仙人手中扇進云只如和尚頌云陽氣發時無硬地秦時𨍏輅鑽生花淮西古佛舌無骨爛嚼虗空吐出查不妨與投子把手共行師云山僧無此語莫謗山僧好進云學人罪過便禮拜師乃云雲門一曲臘月二十五雲峯一曲仲冬二十五葭管動飛灰日輪正卓午昨夜東海鯉魚吞却南山猛虎驚得文殊普賢走入堂前露柱喝一喝上堂僧問新年頭佛法鏡清道有明教道無未審古人意旨如何師云一對無孔鐵槌進云學人問和尚新年頭還有佛法也無未審和尚如何指示師云露柱開花燈籠結果僧便禮拜師乃云一年之計在春一日之計在寅正月建寅元日屬寅元正啓祚萬物咸新僧堂新牀榻臥具新飲食湯藥新一堂禪衲如鳳如麟箇箇握靈蛇之寶人人懷滄海之珍且道佛法還有新舊也無喝一喝請頭首上堂善哉三下板知識盡來參既善知時節吾今不再三古人與麼道大似按牛頭喫草雲峰則不然善哉三下板收足上蒲團脊梁生鐵鑄透過祖師關一氣轉一大藏教背手拈却須彌山七處徵心無心可覓八還辨見無見可還夢入天宮猶未醒金雞啼上玉闌干行化歸上堂僧問昔日寶公令人傳語思大和尚何不下山教化衆生一向目視雲漢作麼此意如何師云雲在嶺頭間不徹水流㵎下太忙生進云思大道三世諸佛被我一口吞盡有什麼衆生可化且道思大具什麼眼目師云咭嘹舌頭三千里進云和尚下山教化衆生與古人是同是別師云常在途中不離家僧禮拜師乃云有佛處不得住無佛處急走過三千里外逢人不得錯舉趙州老人大似抱橋柱澡洗把纜放船山僧一出四十餘日有佛處與他錐破卦文無佛處也曾勘過歷了三州五縣逢人也曾錯舉來只是土曠人稀知音者少摘楊花摘楊花青山忽憶便歸去塵世要看還下來上堂性覺妙明本覺明妙截斷衲僧命根撥開向上一竅牛皮鞔露柱露柱啾啾呌凡耳聽不聞諸聖呵呵笑虗空𨁝跳舞三臺尉斗煎茶不同銚馬𡺸西堂至上堂僧問端獅子道村裏獅子村裏弄眉毛眼睫一時動開得口直儱侗不要人取奉假饒弄到帝王前也是一場乾打閧此意如何師云真獅子兒善獅子吼進云只如蟭螟蟲向蚊子眼睫上作窠向十字街頭呌道土曠人稀相逢者少又且如何師云我不曾見者差異衆生僧禮拜師乃云喚醒馬耆千載夢招回船子一帆風何如晏坐獅子窟哮吼一聲天地空華藏海十三重都盧收在一塵中若是機輪能獨脫看他八面自玲瓏浴佛上堂僧問淨法界身本無出沒大悲願力示有去來敢問悉達太子承誰恩力師云衲僧主丈子進云未審主丈子有何長處師云扶過斷橋水伴歸明月村進云畢竟悉達太子與衲僧主丈子是一是二師云三尺一丈六且同携手歸僧禮拜師乃云天上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者此是釋迦世尊翹足三七日贊底沙佛之偈超過彌勒九十一劫撿點將來好不丈夫只今莫有超彌勒越釋迦者麼設有也好與三十棒回向畢復云兜率宮中間不得却來生此苦娑婆指天指地成何事添得叢林攪閙多儱儱侗侗婆婆和和千年無影樹今時沒底靴上堂麻三斤乾屎橛䗶人冰鵝護雪猫有歃血之功虎有起尸之德趙州親見老南泉林際未是白拈賊青苗會上堂僧問有一經卷藏在一微塵中量等三千大千世界作麼生出得此經師云鯨吞海水盡露出珊瑚枝進云必竟此經作何形狀師云白月則現黑月則隱進云學人擬破微塵出此經卷還得否師云未敢相許進云未審什麼人出得此經師云胡張三黑李四僧禮拜師乃云常啼菩薩賣却心肝學般若則易破一微塵出大經卷則難破一微塵出大經卷則易攝大千經卷入一微塵則難一掬之水可以漲滔天之浪一簣之土可以成九仞之山也不易也不難青山長伴白雲間謝育王專使上堂舉東山謝積善專使偈云積善山中僧有膽如天大敢持居士書來覓空上座跨門不肯休著了方知道歸語晉江人大蟲褁紙帽雲峰亦成一偈玉几山中人老眼光爍爍遠持教府文與我長柄勺柄長把不下還歸舊處著寄語甬東人莫莫莫莫莫上堂十五日已前迦葉糞掃衣價直百千萬十五日已後輪王髻中𤥖不直半分錢正當十五日雪峰百二十斤鐵枷輕如山嶽重若鴻毛若有荷擔得去老僧分半院與他住其或未然千江有水千江月萬里無雲萬里天赴育王上堂拖犁拽杷幾經年鼻孔遼天不受穿業債依然逃不得又吹鐵笛過鄞川小參門人思敬良圭景行等編結夏宿靜奢摩他如鏡照諸像如幻三摩提如苗漸增長禪那唯寂滅如彼器中鍠二千年前婆伽婆與十二大士入于神通大光明藏說此三種法門令末世比丘依此修行不墮邪見大似牛皮鞔露柱露柱啾啾叫凡耳聽不聞諸聖呵呵笑今有比丘某甲於雲峰頂上與現前大衆踞菩薩乘修寂滅行同入實相住持雖不依此三種修行却要九十日內箇箇心空及第拍膝云三面狸奴腳踏月兩頭白牯手拏烟戴冠老兔立庭柏脫殼烏龜飛上天冬至若論此事眨上眉毛早已蹉過鐵馬驟冰稜不涉唇吻道將一句來石牛欄古路戢玄機於未兆藏冥運於即化固是罕遇其人會萬物歸自己與天地而同根又是阿誰分上事諸方將謂仰山進前叉手香嚴叉手進前甚生極則殊不知大似楊廣失驝駝韓信臨朝底雲峰有年無德山寺荒凉幸而四海禪流來此相伴未免向八德池邊宏開瑤席紫羅帳裏暗撒真珠共慶書雲令節還委悉麼若教嫫母臨明鏡也道不勞紅粉施拈主丈卓一下月江和尚住四明阿育王山廣利禪寺語録門人本真紹宗文闡編師於元統元年九月十五日受請入寺指山門云大解脫門八字打開了也彈指下喝總不消得拈廣教府疏揮魯陽戈重光佛日廣大教門斯為第一指法座云壁立萬仞不必高升合水和泥聊通一線升座祝贊罷就座云若論第一義諦譬如虗空體非羣相而不拒彼諸相發揮莫有向虗空裏釘橛者麼僧出問摩騰入漢已涉繁詞達磨西來不依本分和尚今日開堂願聞祝贊師云黃河如帶太山如礪進云與麼則皇恩佛恩一時報畢師云大家齊唱太平歌進云只如大覺禪師為九峰一疏而來和尚可謂古今一揆師云漳泉福建頭匾似扇進云向上還有事也無師云逢人不得錯舉師乃云佛法遍在一切處一切山河及國土無他方此土之殊無過現未來之異雲門大師云你諸人擔鉢囊行腳不知有佛法佛殿上鴟吻却知有佛法上是天下是地日月星辰森羅萬象各依定位喚什麼作佛法馬大師道我自從胡亂後三十年不曾少鹽醬喚作佛法得麼大梅云任你非心非佛我只是即心即佛喚作佛法得麼楊岐云金剛捲要你透栗棘蓬要你吞喚作佛法得麼東山五祖云我向白雲門下咬破一個鐵餕餡直是百味具足喚作佛法得麼且喜沒交涉須知生佛未具已前八萬四千舍利光明常在你諸人面門出入自是諸人不覺不知當面諱却山僧到者裏說箇什麼即得所以道我若坐時你須立我若立時你須坐你若野干鳴我即獅子吼你若獅子吼我即野干鳴可以光揚佛日大振玄風建立法幢發揮宗旨即辰秋高氣清伏惟諸山和尚合山大衆各各起居輕利拈主丈浙東山浙西水四海五湖皇化裏卓主丈一下復舉世尊一日升座迦葉白槌云世尊說法竟世尊便下座拈云古今皆謂世尊三昧迦葉不知因甚世尊一詞不措迦葉便乃白椎古人且置今日事作麼生久立珍重小參僧問師唱誰家曲宗風嗣阿誰師云風吹石臼念摩訶進云恁麼則已得真人好消息人間天上更無疑師云水底捉麒麟進云如何是奪人不奪境師云西天人不會唐言進云如何是奪境不奪人師云有馬騎馬無馬步行進云如何是人境兩俱奪師云新羅打鼓大唐齊進云如何是人境俱不奪師云閙市裏拋碌磚進云人境已蒙師指示向上宗乘事若何師云有水皆含月無山不帶雲進云只如楊岐祖師道踏著稱槌硬似鐵啞子得夢向誰說須彌頂上浪滔天大洋海底遭火熱明什麼邊事師云如驢覷井如井覷驢僧云謝師答話師乃云寶劍出匣孰敢嬰鋒明鏡當臺舉無遺照雪峰杓頭邊舀得一千五百人善知識只好無佛處稱尊妙喜竹篦下打翻萬七千指活衲僧僅免死水裏浸却山僧素非建大將旗鼓手段又無青天白日轟礔礰之機只是近離清苕過了三江九偃到得古貿山中直是眼不見鼻孔此際更深夜靜月白風清不免唱箇脫空歌子使現前一衆與我中峯老祖兩得相見赤日晒來乾絡索秋風吹起又新鮮幾向江邊問消息鷺鷥踏却釣魚船喝一喝復舉首山和尚示衆云咄哉巧女兒攛梭不解織貪看鬪雞人水牛也不識又云咄哉拙郎君巧妙無人識打破鳳林關著靴水上立師云二人同心其義斷金前住當山此菴和尚拈云總有來處拈主丈云上大人丘一己化三千七十士師云唵齒臨唵部臨莎訶開爐進退兩序上堂僧問如何是金佛不度爐師云蘇盧蘇盧進云如何是木佛不度火師云悉利悉利進云如何是泥佛不度水師云趙州東院西進云如何是真佛內裏坐師云嵩山破竈墮僧禮拜師乃云東邊是知事西邊是頭首獅子兒哮吼龍馬駒𨁝跳火爐闊一丈古鏡闊一丈古佛塔廟前面南看北斗臘八上堂僧問半夜逾城時如何答云國清才子清家富小兒嬌僧云雪山六年所成者何事答云癡人面前不得說夢僧云古今皆謂見明星悟道還諦當也無答云一犬吠虗千猱啀實師乃云我觀大地衆生具有如來智慧德相但以妄想執著而不證得釋迦老子與麼道大似蟭螟蟲向蚊子眼睫上作窠向十字街頭叫道土曠人稀相逢者少檢點將來也是噇酒糟漢上堂舉五祖和尚示衆云白雲不會說禪山門開向兩邊有人動著關捩兩片東扇西扇五祖老人蓋為慈悲之故有落草之談育王不會說禪屋破覷見青天等間從頭蓋覆寧免紙褁麻纏但願有錢留客醉也勝騎馬傍人門上堂僧問如何是一生二師云元首明股肱良進云如何是二生三師云黃河三千年一度清進云如何是三生萬物師云山河無隔礙光明處處透進云只如新年頭佛法還有者箇消息也無師云樊噲踏鴻門僧作禮師乃云有問新年事東君總未知燈籠才起舞露柱便掀眉雪嶺泥牛吼雲門木馬嘶樵歌與漁唱同共樂無為道濟忠長老通嗣書上堂自從胡亂後三十年不曾少鹽醬江西信息通也任你非心非佛我只是即心即佛大梅梅子熟也此乃從上古德風規叢林榜樣只如石頭道書亦不達信亦不通又作麼生有人道得與你鈯斧子上堂舉僧問五祖一大藏教是箇切腳且道切什麼字祖云鉢羅娘應菴問密菴如何是正法眼密菴云破沙盆師拈云閩蜀同風肚裏有蟲到雪竇衆請上堂僧問迅瀑千尋懸崖萬仞和尚從什麼處來答云官不容針私通車馬進云一日水空和尚訪大顛和尚顛把住坐具云不用通寒暄不用通來處此意如何答云嶮進云水空云擬欲恁麼又恐人情不足還契他大顛意也無答云錦包特石綿褁蒺䔧進云大顛放手云還足也未水空提起坐具云若通時暄又恐迷來處大顛云暫時相見也無妨又作麼生答云虎頭虎尾一時收進云只如和尚入山與雪竇和尚相見較之古人是同是別答云竹密不妨流水過山高豈礙白雲飛進云謝師答話師乃云向上一路千聖不傳釋迦彌勒仰望不及向上一路千聖不然德山臨濟窺覷無門故我明覺祖師昔日向妙高臺上唱出陽春白雪直得須彌岌嶪海水騰波十方世界風凜凜地育王今晨得得入山瞻禮慈容特蒙堂頭禪師闡揚二覺之家風傾瀉千尋之雪瀑復令山野升于此座舉唱宗乘然則客聽主裁又說箇什麼即得擊拂子就樹摘將黃葉去入山推出白雲來復舉堂頭禪師適來舉臨濟栽松次黃檗問云深山中栽許多松作麼濟云一與山門作境致二與後人作標榜道了以钁頭築地三下檗云雖然子已喫吾三十棒了也濟又以钁打地作噓噓聲檗云吾宗到汝大興於世溈山問仰山云當時黃檗只囑一人別更有在仰山云有祇是年代深遠不欲舉似和尚溈山云但舉看吾也要知仰山云一人指南令行吳越遇大風則止應菴和尚拈云黃檗道雖然如是子已喫吾三十棒了也養子之緣固當如是臨濟正令雖行可惜向钁頭邊甘自活埋仰山見解未出常流豈止遇大風則止當時何不道直待虗空界盡此話方始大行豈不是頭正尾正師乃召大衆云黃檗臨濟兩父子開口不在舌頭上溈山仰山勺卜聽虗聲老應菴擘開太華放出黃河石室翁燃犀炬照開滄海育王見處也要諸人共知一人指南令行吳越太虗空中不消釘橛藕絲竅裏騎大鵬等間挨落天邊月久立衆慈伏惟珍重冬至上堂僧問吾本來茲土傳法救迷情意旨如何師云大蟲褁紙帽好笑又驚人進云一花開五葉結果自然成又作麼生師云冬至寒食一百五師乃云運推移日南長至明明百草頭明明祖師意三更夜半唱巴歌無端驚起梵王睡喝一喝下座臘八上堂二千年前臘月八黃面瞿曇雙眼活阿僧祇劫喫鹽多苦行六年添得渴凍不殺餓不殺腳頭腳底乾坤闊上堂護聖青山和尚至一池荷葉衣無盡數樹松花食有餘剛被世人知住處又移茅舍入深居大梅祖師將大地撮來如粟米粒大於其中間開拓三千大千世界向一莖草上現出玉殿瓊樓建立百千殊勝法幢直得三世諸佛歷代祖師天下老和尚莫不望風斫額直饒龐居士牙如劍樹口似血盆到他面前盡力只道個百雜碎核子裏滋味依然未夢見在還委悉麼青山不鎖長飛勢滄海合知來處高大覺禪師忌拈香代圓通應詔而起為九峰草疏而來對使者焚却龍腦之鉢創蒙堂如筑黃金之臺此是大覺老人平生受用不盡底三昧雖相去二三百載而聲光煒燁猶百千之迅雷稽首僧伽真古佛鄮峰千古碧崔嵬上堂不著佛求不著法求不著僧求燈籠發笑露柱點頭雲門拈出胡餅投子道箇油油腰纏十萬貫騎鶴上揚州重建上塔緣化歸上堂僧問釋迦如來有八萬四千真身舍利因甚南瞻部洲只有一顆師云天上天下唯吾獨尊進云莫是惟一堅密身一切塵中現麼師云閙市裏虎進云大權菩薩因甚以手加額師云行船全在把梢人進云不得春風花不開花開全藉春風力師云將謂無人證明僧禮拜而退師乃云鐵輪王使鬼神功靈塔飛來鄮嶺東有客不隨流水去磬敲疏雪細雲中乃竪拂子云看看大權菩薩歸也與耶舍尊者只今在山僧拂子頭上相見尊者云菩薩一出月餘四大輕安否世事可忍否衆生易度不菩薩云你在屋裏受人天供養坐致太平茄子瓠子那裏得知阿育王聞得出來道你二人何必之乎者也若無我釋迦如來真身舍利寶塔縱有神通妙用也無施展處三人撫掌呵呵大笑且道笑箇什麼夜靜水寒魚不食滿船載得月明歸上堂教中道一切障礙即究竟覺得念失念無非解脫成法破法皆名涅槃智慧愚癡通為般若拈云夜半放烏雞驚起梵王睡便下座上堂薰風自南來殿閣生微凉老妙喜錯認驢鞍橋作阿爺下頷帶纍多少人向者裏卜度還知諸佛出身處麼黃河三千年一度清卓主丈下座上堂舉僧問歸宗如何是佛宗云我不辭向汝道只恐你不信僧云和尚誠言安敢不信宗云即汝便是僧云如何保任宗云一翳在眼空花亂墜頌云三尺劒為安國計五言詩是上天梯青霄有路終須到金榜無名誓不歸為行者福吉下火吉凶悔吝成住壞空死中得活腰石負舂火裏蝍蟟吞却大蟲上堂舉僧問趙州如何是道州云墻外底僧云我不問者箇道州云你問什麼道僧云問大道州云大道透長安頌云大道透長安古今行不到鮎魚上竹竿大蟲看水磨推出江西馬簸箕踢倒嵩山破竈墮上堂朝忩匇暮匇忩鉢盂開口只要噇空南泉打破鍋子甘贄禮拜蒸籠擊拂子萬里八九月一身西北風初祖忌拈香跨水逢羊歷魏遊梁八九年冷坐全無巴鼻三五回中毒也好恓惶若謂是十萬里西來傳佛心印無鼻孔漢將什麼聞香為華監寺下火推倒涅槃城打破華胥國楊岐一頭驢𨁝跳乾坤窄五蘊山頭火光爍爍上堂立春之日百事大吉門上釘桃符籬頭吹篳篥林下參玄人有口只挂壁泥牛鞭起趂春耕通身總是黃金骨元宵上堂僧問我此法門名無盡燈冥者皆明明終不盡如何是無盡燈師云天際日上月下檻前山深水寒進云還許學人續焰聯芳也無師云莫妄想僧喝一喝便歸衆師云弄泥團漢有什麼限師乃云今朝正月十五處處村歌社舞曲彔牀上老僧隨分說佛說祖雪峰輥毬禾山打鼓驚起東海鯉魚吞却南山猛虎報諸人休莽鹵我見燈明佛本光瑞如此上堂舉法眼和尚示衆云欲識佛性義當觀時節因緣古人方便不少不見石頭和尚因看肇論云會萬物為己者其惟聖人乎他家便道聖人無己靡所不己有一片言語喚作參同契末上云竺土大仙心無過此語中間也只隨時說話拈云若是真正舉揚竺土大仙心者一句子也不消得諸人要會聖人無己靡所不己麼問取露柱小參門人寶生文藻編結夏琅瑘點出五病西院商量兩錯井蛙不足以語東海夏蟲不可以語冰霜若是捎空俊鶻便合乘時止濼困魚徒勞激浪是故從上若佛若祖天下老和尚莫不向刀山劍樹上鑊湯爐炭中成等正覺拔濟有情若約山僧看來也是稱鎚蘸醋喝一喝解夏秋初夏末兄弟家東去西去如壯士展臂不假他力如獅子遊行不求伴侶蓋為人人腳跟下有條通天活路三世諸佛六代祖師天下老和尚與你把手共行豈不見雲門大師問洞山近離甚處查渡夏在甚處湖南報慈幾時離彼八月二十五雲門云放你三頓棒次日上方丈問云昨日蒙和尚放三頓棒不知過在甚處雲門云飯袋子江西湖南便恁麼去洞山於言下大悟雲門提出倚天長劒凜凜神鋒不易洞山敢將赤身衝他白刃正與麼時如何金烏破琉璃殼玉兔挨開碧海門除夕絶學無為間道人只管三十六旬為一歲不懼生死老和尚任他臘月三十日到來如鐘在待扣則鳴似鏡臨臺物來斯照老僧行年在坎窮鬼揶揄囊無繫蟻之絲廚絶聚蠅之糝塵說剎說熾然說無法可說內空外空畢竟空一切皆空凍鎖寒林燒盡丹霞木佛春回暖律喚醒陝府鐵牛萬人藂裏打驅儺百戲棚頭抽傀儡畢竟成得箇什麼邊事擊拂子相逢不遇調羮手孤負梅花又一年
